/**
 * GTOLib 流水线（路线 A：dev 双轨 + 发行单轨 两种加密产物）
 *
 * 1) 加密（默认）产出两份，均由 buildGtolibProtected 同步到 libs/：
 *    a. dev 预构建 libs/gtolib-protected.jar（双轨 keepnames：hollow + .prod.bin + .dev.bin）
 *       —— 无权限开发者编译 + userdev 运行的唯一入口，类名保留（.dev.bin 路径键约定）
 *    b. 发行单轨 libs/gtolib-release.jar（proguard-release-rules.pro：内部类名/包名混淆，
 *       -repackageclasses；Seal 以混淆 jar 自洽打包后剥除全部 .dev.bin）
 *       —— 玩家发行 jar 的唯一包体来源；named 字节码不进发行包
 * 2) 未加密（仅有源码 + 显式参数）：gtolib-unprotected 明文，便于断点
 *    开关：-PgtolibUnprotected=true | -PgtolibDebug=true | -PskipGtolibProtect=true
 *    （或 env GTOLIB_DEBUG / PROGUARD_DISABLE / 本地 .gtolib-debug 标记）
 *    明文绝不同步到 libs/gtolib-protected.jar，无权限也永远拿不到明文。
 *
 * 任务：buildGtolibProtected（加密构建并同步 libs 预构建对：protected + release）
 *
 * 有源码（GTOLib/）：始终并入 sourceSets.main，供 IDEA 跳转/增量编译；
 *   isGtolibJarUpToDate 仅跳过 ProGuard/Seal。
 * 无源码：libs/gtolib-protected.jar + libs/gto-seal-runtime-1.0.jar
 * 强制重建：-PgtolibRebuild=true
 */

import java.nio.file.Files
import java.nio.file.StandardCopyOption
import java.security.MessageDigest
import java.security.SecureRandom

ext.gtolibBuildDir = layout.buildDirectory.dir('gtolib')
ext.gtolibRawJar = layout.buildDirectory.file('gtolib/gtolib-raw.jar')
ext.gtolibUnprotectedJar = layout.buildDirectory.file('gtolib/gtolib-unprotected.jar')
ext.gtolibPgJar = layout.buildDirectory.file('gtolib/gtolib-proguard.jar')
ext.gtolibProtectedJar = layout.buildDirectory.file('gtolib/gtolib-protected.jar')
ext.gtolibReadyJar = layout.buildDirectory.file('gtolib/gtolib-ready.jar')
ext.gtolibStampFile = layout.buildDirectory.file('gtolib/inputs.stamp')
ext.gtolibProtectedLibsJar = file('libs/gtolib-protected.jar')
ext.gtolibUnprotectedLibsJar = file('libs/gtolib-unprotected.jar')
// 路线 A：发行单轨产物（内部类名混淆、无 .dev.bin）。
// libs/gtolib-protected.jar 仍是无权限开发者的 dev 预构建（双轨、keepnames），
// 玩家发行 jar 改从 gtolib-release 组装。
ext.gtolibPgReleaseJar = layout.buildDirectory.file('gtolib/gtolib-proguard-release.jar')
ext.gtolibSealedReleaseJar = layout.buildDirectory.file('gtolib/gtolib-sealed-release.jar')
ext.gtolibReleaseJar = layout.buildDirectory.file('gtolib/gtolib-release.jar')
ext.gtolibReleaseLibsJar = file('libs/gtolib-release.jar')
ext.gtolibReleaseSidecarFile = file('libs/gtolib-release.PROTECTED')
ext.gtolibProtectDir = file('GTOLib/protect')
// GTO Seal 私有 submodule（GTOCore-Seal → GTOSeal/）——仅改 Runtime 本身时需要
ext.gtosealDir = file('GTOSeal')
ext.gtosealProtectDir = file('GTOSeal/protect')
ext.hasGtosealSources = file('GTOSeal/src/main/java/gto/native0').exists()

ext.hasGtolibSources = file('GTOLib/src/main/java/com/gtolib').exists()
ext.canProguard = file("${gtolibProtectDir}/proguard-rules.pro").exists()
ext.canProguardRelease = file("${gtolibProtectDir}/proguard-release-rules.pro").exists()
// Packager 在 GTOLib/protect：改 gtolib 只需 GTOLib 权限即可重新加密。
// GTOSeal/protect 仅作历史/备用路径。
ext.sealPackagerJar = {
    def candidates = [
            file("${gtolibProtectDir}/gto-seal-packager.jar"),
            file("${gtosealProtectDir}/gto-seal-packager.jar"),
    ]
    candidates.find { it.exists() }
}()
ext.canSealPack = sealPackagerJar != null && sealPackagerJar.exists()
// 写入 Manifest 的最低 Runtime 版本（gto_seal_min）
ext.gtoSealMinVersion = (project.findProperty('gto_seal_min') ?: '0').toString()

// ---------- 快速指纹（不读文件全文）+ jar 内容哈希 ----------
ext.computeGtolibFingerprint = {
    if (!hasGtolibSources) {
        return ''
    }
    def md = MessageDigest.getInstance('SHA-256')
    def files = []
    [file('GTOLib/src'), file('GTOLib/protect')].each { root ->
        if (!root.exists()) return
        root.eachFileRecurse { f ->
            if (!f.isFile()) return
            if (f.name.endsWith('.jks') || f.name == 'keystore.jks') return
            // 大二进制 / 证书不参与指纹（体积大且与逻辑无关）
            if (f.name == 'gto-seal-packager.jar' || f.name.endsWith('.jar') && f.name.contains('seal')) return
            if (f.name.endsWith('.cert') || f.name.endsWith('.jks')) return
            files << f
        }
    }
    files.sort { a, b -> a.absolutePath <=> b.absolutePath }
    files.each { f ->
        def rel = rootProject.projectDir.toPath().relativize(f.toPath()).toString().replace('\\', '/')
        md.update(rel.getBytes('UTF-8'))
        md.update((byte) 0)
        md.update(Long.toString(f.length()).getBytes('UTF-8'))
        md.update((byte) 0)
        md.update(Long.toString(f.lastModified()).getBytes('UTF-8'))
        md.update((byte) 0)
    }
    md.digest().collect { String.format('%02x', it) }.join('')
}

/** 文件内容 SHA-256（小写 hex） */
ext.computeFileSha256 = { File f ->
    if (f == null || !f.exists() || !f.isFile()) return ''
    def md = MessageDigest.getInstance('SHA-256')
    f.withInputStream { is ->
        byte[] buf = new byte[8192]
        int n
        while ((n = is.read(buf)) > 0) {
            md.update(buf, 0, n)
        }
    }
    md.digest().collect { String.format('%02x', it) }.join('')
}

/**
 * stamp 格式（兼容旧版单行 fingerprint）：
 *   fingerprint=<源码指纹>
 *   jarSha256=<gtolib-protected.jar 内容哈希>
 */
ext.readGtolibStamp = {
    def stamp = gtolibStampFile.get().asFile
    def out = [fingerprint: '', jarSha256: '']
    if (!stamp.exists()) return out
    def text = stamp.getText('UTF-8').trim()
    if (text.isEmpty()) return out
    def lines = text.readLines()*.trim().findAll { it }
    if (lines.size() == 1 && !lines[0].contains('=')) {
        out.fingerprint = lines[0]
        return out
    }
    lines.each { line ->
        def i = line.indexOf('=')
        if (i <= 0) return
        def k = line.substring(0, i).trim()
        def v = line.substring(i + 1).trim()
        if (k == 'fingerprint' || k == 'jarSha256') out[k] = v
    }
    return out
}

ext.writeGtolibStamp = { String fingerprint, String jarSha256 ->
    def stamp = gtolibStampFile.get().asFile
    stamp.parentFile.mkdirs()
    stamp.text = "fingerprint=${fingerprint}\njarSha256=${jarSha256}\n"
}

/**
 * 与 libs/gtolib-protected.jar 成对的侧车元数据（CI sources=false 用 jarSha256 校验）。
 * 凡同步/写入 libs 预构建 jar 时必须调用，避免 jar 已新、.PROTECTED 仍旧。
 */
ext.writeGtolibSidecar = { File jarFile, File sidecarFile, String fingerprint, String method ->
    if (jarFile == null || !jarFile.exists()) {
        throw new GradleException("writeGtolibSidecar: jar 无效: ${jarFile}")
    }
    def jarSha = computeFileSha256(jarFile)
    def fp = (fingerprint != null && !fingerprint.isEmpty()) ? fingerprint : ''
    sidecarFile.text =
            "protected=true\nmethod=${method}\n" +
                    "runtime=full-seal-runtime\n" +
                    "updated=${new Date()}\n" +
                    "size=${jarFile.length()}\n" +
                    "fingerprint=${fp}\n" +
                    "jarSha256=${jarSha}\n"
    logger.lifecycle(
            "GTOLib: 已写入 ${sidecarFile.name} " +
                    "size=${jarFile.length()} jarSha=${jarSha.take(16)}…"
    )
    return jarSha
}

ext.writeGtolibProtectedSidecar = { File jarFile, String fingerprint = gtolibFingerprint ->
    writeGtolibSidecar(jarFile, file('libs/gtolib-protected.PROTECTED'), fingerprint, 'proguard+gto-seal')
}

ext.readSidecarMeta = { File f ->
    def out = [fingerprint: '', jarSha256: '', size: '']
    if (f == null || !f.exists()) return out
    f.eachLine { line ->
        def i = line.indexOf('=')
        if (i <= 0) return
        def k = line.substring(0, i).trim()
        def v = line.substring(i + 1).trim()
        if (out.containsKey(k)) out[k] = v
    }
    return out
}

ext.readProtectedMeta = {
    readSidecarMeta(file('libs/gtolib-protected.PROTECTED'))
}

/**
 * gtolib 构建被跳过 / 使用预构建时：校验「源码指纹 + jar 内容哈希」与记录一致。
 * 不一致 → 硬失败，提示漏构建或产物未上传。
 */
ext.verifyGtolibSkipConsistency = { File jarFile, boolean skippedRebuild ->
    if (jarFile == null || !jarFile.exists() || jarFile.length() == 0) {
        throw new GradleException("GTOLib 一致性校验失败：jar 不存在或为空 → ${jarFile}")
    }
    def actualJarSha = computeFileSha256(jarFile)
    def stamp = readGtolibStamp()
    def meta = readProtectedMeta()
    def expectedFp = stamp.fingerprint ?: meta.fingerprint
    def expectedJarSha = stamp.jarSha256 ?: meta.jarSha256

    if (hasGtolibSources) {
        def currentFp = gtolibFingerprint
        if (!currentFp) {
            throw new GradleException("GTOLib 一致性校验失败：无法计算当前源码指纹")
        }
        // 跳过重建时：源码指纹必须与 stamp 一致（否则不该 skip）
        if (skippedRebuild) {
            if (!stamp.fingerprint) {
                throw new GradleException(
                        "GTOLib 一致性校验失败：构建被跳过，但 stamp 缺少 fingerprint。\n" +
                                "请直接: ./gradlew runData  或  ./gradlew build  （会自动重编 gtolib）\n" +
                                "必要时加 -PgtolibRebuild=true 强制重建。"
                )
            }
            if (stamp.fingerprint != currentFp) {
                throw new GradleException(
                        "GTOLib 一致性校验失败：源码指纹与 stamp 不一致（构建被跳过）。\n" +
                                "原因：GTOLib 源码已修改，但尚未走完自动保护流水线。\n" +
                                "  当前源码 fingerprint = ${currentFp}\n" +
                                "  stamp fingerprint    = ${stamp.fingerprint}\n" +
                                "请直接: ./gradlew runClient / runData / build\n" +
                                "（有 GTOLib 源码时会自动 ProGuard+Seal，无需额外任务）"
                )
            }
        }
        // jar 内容哈希：与 stamp 或 PROTECTED 记录比对
        if (expectedJarSha) {
            if (actualJarSha != expectedJarSha) {
                throw new GradleException(
                        "GTOLib 一致性校验失败：gtolib-protected.jar 内容哈希与记录不一致。\n" +
                                "原因：GTOLib 已改过但未重新构建，或本地 jar 被替换。\n" +
                                "  jar 路径           = ${jarFile}\n" +
                                "  实际 jarSha256     = ${actualJarSha}\n" +
                                "  期望 jarSha256     = ${expectedJarSha}\n" +
                                "  源码 fingerprint   = ${currentFp}\n" +
                                "请直接: ./gradlew -PgtolibRebuild=true build  （或 runClient / runData）"
                )
            }
        } else if (skippedRebuild) {
            throw new GradleException(
                    "GTOLib 一致性校验失败：构建被跳过，但未找到 jarSha256 记录。\n" +
                            "请直接: ./gradlew -PgtolibRebuild=true build  （写入完整 stamp）"
            )
        }
        logger.lifecycle(
                "GTOLib 一致性 OK (sources=true skip=${skippedRebuild}): " +
                        "fp=${currentFp.take(16)}… jarSha=${actualJarSha.take(16)}…"
        )
    } else {
        // 无源码：只能校验公开预构建 jar 与 .PROTECTED 中的 jarSha256
        if (expectedJarSha) {
            if (actualJarSha != expectedJarSha) {
                throw new GradleException(
                        "GTOLib 一致性校验失败：libs 预构建 jar 与 .PROTECTED 记录不一致。\n" +
                                "原因：仓库里的 gtolib-protected.jar / .PROTECTED 不同步（损坏或传错）。\n" +
                                "  jar 路径       = ${jarFile}\n" +
                                "  实际 jarSha256 = ${actualJarSha}\n" +
                                "  期望 jarSha256 = ${expectedJarSha}\n" +
                                "无 GTOLib 源码时无法本地重编；请从官方 Main 重新 clone/pull，或联系有权限维护者修复 libs/。"
                )
            }
            logger.lifecycle(
                    "GTOLib 一致性 OK (prebuilt): jarSha=${actualJarSha.take(16)}… " +
                            "fpMeta=${(expectedFp ?: '').take(16)}${expectedFp ? '…' : '(none)'}"
            )
        } else {
            logger.warn("GTOLib: 无源码且 .PROTECTED 无 jarSha256，跳过内容哈希校验")
        }
    }
}

/**
 * 扫描 gtocore 主源码对 com.gtolib 的 import，要求指定 jar 内存在对应 .class（hollow 亦可）。
 * 捕获「主仓 import 面与 jar 不一致」——发行单轨混淆后 keep 面不足时在构建期报错。
 *
 * 解析规则：
 * - {@code import com.gtolib.pkg.Type;} → 需要 Type.class
 * - {@code import com.gtolib.pkg.Type.*;} / {@code import static com.gtolib.pkg.Type.*;}
 *   → Type.class 或 pkg/Type/ 下存在 class（嵌套类型 / 包）
 * - {@code import static com.gtolib.pkg.Type.MEMBER;} → 需要 Type.class（MEMBER 为字段/方法）
 */
ext.verifyMainGtolibImportsAgainstJar = { File jarFile ->
    if (jarFile == null || !jarFile.exists()) {
        throw new GradleException("verifyMainGtolibImportsAgainstJar: jar 无效 → ${jarFile}")
    }
    def entries = new HashSet<String>()
    def zf = new java.util.zip.ZipFile(jarFile)
    try {
        zf.entries().each { e -> entries.add(e.name) }
    } finally {
        zf.close()
    }
    def hasClass = { String fqn ->
        entries.contains(fqn.replace('.', '/') + '.class')
    }
    def hasPackageOrClass = { String fqn ->
        if (hasClass(fqn)) return true
        def prefix = fqn.replace('.', '/') + '/'
        return entries.any { it.startsWith(prefix) && it.endsWith('.class') }
    }
    // static import 的 MEMBER 可能是字段/方法：从右剥离直到命中 class
    def resolveStaticTarget = { String fqn ->
        def parts = fqn.split('\\.') as List
        // 至少 com.gtolib.X
        for (int n = parts.size(); n >= 3; n--) {
            def tryFqn = parts.subList(0, n).join('.')
            if (hasClass(tryFqn)) return true
        }
        return false
    }
    def importRe = ~/^import\s+(static\s+)?(com\.gtolib\.[A-Za-z0-9_.*]+)\s*;?\s*$/
    def missing = new LinkedHashSet<String>()
    def scanned = 0
    def roots = [file('src/main/java'), file('src/main/kotlin')].findAll { it.exists() }
    roots.each { root ->
        root.eachFileRecurse { f ->
            if (!f.isFile()) return
            if (!(f.name.endsWith('.java') || f.name.endsWith('.kt'))) return
            f.eachLine { line ->
                def m = importRe.matcher(line.trim())
                if (!m.find()) return
                scanned++
                def isStatic = m.group(1) != null
                def fqn = m.group(2)
                if (fqn.endsWith('.*')) {
                    def base = fqn.substring(0, fqn.length() - 2)
                    if (!hasPackageOrClass(base)) {
                        missing.add(fqn + "  (type/package missing in jar)")
                    }
                    return
                }
                // 精确类型
                if (hasClass(fqn)) {
                    return
                }
                // static / Kotlin 成员 import：com.gtolib...Type.member
                if (resolveStaticTarget(fqn)) {
                    return
                }
                // Kotlin 顶层函数：com.gtolib.pkg.funcName → 包内存在任一 .class
                def parts = fqn.split('\\.') as List
                if (parts.size() >= 4) {
                    def parent = parts.subList(0, parts.size() - 1).join('.')
                    def parentSimple = parts.get(parts.size() - 2)
                    // 父段小写开头 → 视为包（Kotlin top-level）；大写 → 已在 resolveStatic 处理
                    if (!Character.isUpperCase(parentSimple.charAt(0)) && hasPackageOrClass(parent)) {
                        return
                    }
                }
                missing.add(isStatic ? ("static " + fqn) : fqn)
            }
        }
    }
    if (!missing.isEmpty()) {
        def sample = missing.take(30).collect { "  - ${it}" }.join('\n')
        throw new GradleException(
                "GTOLib 预构建 API 校验失败：gtocore 主源码 import 了 jar 中不存在的 com.gtolib 类型。\n" +
                        "发行单轨下通常表示混淆 keep 面不足（或 jar 相对源码过期）。\n" +
                        "缺失 ${missing.size()} 项（最多列出 30）：\n${sample}\n" +
                        "有权限者请: ./gradlew -PgtolibRebuild=true buildGtolibProtected"
        )
    }
    logger.lifecycle(
            "GTOLib API 校验 OK: 主源码 com.gtolib import ${scanned} 条均可在 ${jarFile.name} 解析"
    )
}

/**
 * 路线 A：校验发行单轨预构建对（libs/gtolib-release.jar + libs/gtolib-release.PROTECTED）。
 * - jar 内容哈希必须与 sidecar 一致；
 * - 有源码：sidecar.fingerprint 必须等于当前源码指纹；
 *   无源码（CI）：必须等于 libs/gtolib-protected.PROTECTED 的 fingerprint（同一次构建产物）；
 * - gtocore 主源码全部 com.gtolib import 必须能在发行 jar 内按名解析
 *   （keep 面不足 → 混淆改掉了 gtocore 链接面 → 在这里而不是玩家端崩）。
 */
ext.verifyGtolibReleasePair = {
    def jar = gtolibReleaseLibsJar
    def meta = readSidecarMeta(gtolibReleaseSidecarFile)
    if (!jar.exists() || jar.length() == 0) {
        throw new GradleException(
                "GTOLib release 校验失败：libs/gtolib-release.jar 不存在或为空。\n" +
                        "请有权限者: ./gradlew -PgtolibRebuild=true buildGtolibProtected\n" +
                        "并提交 libs/gtolib-release.jar + libs/gtolib-release.PROTECTED。"
        )
    }
    if (!meta.jarSha256) {
        throw new GradleException(
                "GTOLib release 校验失败：libs/gtolib-release.PROTECTED 缺少 jarSha256。\n" +
                        "请有权限者重建并提交成对文件。"
        )
    }
    def actual = computeFileSha256(jar)
    if (actual != meta.jarSha256) {
        throw new GradleException(
                "GTOLib release 校验失败：libs/gtolib-release.jar 与 .PROTECTED 记录不一致。\n" +
                        "  实际 jarSha256 = ${actual}\n" +
                        "  记录 jarSha256 = ${meta.jarSha256}\n" +
                        "请有权限者: ./gradlew -PgtolibRebuild=true buildGtolibProtected"
        )
    }
    def expectFp = hasGtolibSources ? gtolibFingerprint : readProtectedMeta().fingerprint
    if (!meta.fingerprint || (expectFp && meta.fingerprint != expectFp)) {
        throw new GradleException(
                "GTOLib release 校验失败：发行单轨与当前源码/dev 预构建不同源。\n" +
                        "  release fingerprint = ${meta.fingerprint}\n" +
                        "  期望 fingerprint    = ${expectFp}\n" +
                        "请有权限者: ./gradlew -PgtolibRebuild=true buildGtolibProtected"
        )
    }
    verifyMainGtolibImportsAgainstJar(jar)
    logger.lifecycle("GTOLib release 一致性 OK: jarSha=${actual.take(16)}…")
}

/**
 * 玩家发行 jar 应嵌入的 gtolib 包体（jar 任务与 Salt 读取共用，保证同一份）：
 * - 调试明文模式：沿用本地 protected（此时它是明文）/ ready；
 * - 默认：build 新产物 gtolib-release.jar，其次 libs 预构建；
 * - 都没有 → null（jar 任务据此硬失败，禁止悄悄回退到弱的双轨 protected 包）。
 */
ext.resolveGtolibReleaseEmbedJar = {
    if (hasGtolibSources && detectGtolibDebugMode()) {
        def protectedFile = gtolibProtectedJar.get().asFile
        def ready = gtolibReadyJar.get().asFile
        return (protectedFile.exists() && protectedFile.length() > 0) ? protectedFile : ready
    }
    def rel = gtolibReleaseJar.get().asFile
    if (rel.exists() && rel.length() > 0) return rel
    if (gtolibReleaseLibsJar.exists() && gtolibReleaseLibsJar.length() > 0) return gtolibReleaseLibsJar
    return null
}

ext.gtolibFingerprint = computeGtolibFingerprint()

ext.isGtolibJarUpToDate = {
    if (!hasGtolibSources) {
        return false
    }
    if (findProperty('gtolibRebuild') == 'true') {
        return false
    }
    def rebuild = { String reason ->
        logger.lifecycle("GTOLib: ${reason} -> 自动重建保护产物")
        return false
    }
    def stamp = readGtolibStamp()
    def prot = gtolibProtectedJar.get().asFile
    def unprot = gtolibUnprotectedJar.get().asFile
    def meta = readProtectedMeta()
    if (!stamp.fingerprint || gtolibFingerprint.isEmpty()) {
        return rebuild('缺少源码指纹记录')
    }
    if (!prot.exists() || prot.length() == 0) {
        return rebuild('build/gtolib/gtolib-protected.jar 缺失')
    }
    if (!unprot.exists() || unprot.length() == 0) {
        return rebuild('build/gtolib/gtolib-unprotected.jar 缺失')
    }
    if (stamp.fingerprint != gtolibFingerprint) {
        return rebuild('源码指纹已变化')
    }
    if (!stamp.jarSha256) {
        return rebuild('stamp 缺少 dev protected jar 哈希')
    }
    def protectedSha = computeFileSha256(prot)
    if (protectedSha != stamp.jarSha256) {
        return rebuild(
                "build dev protected jar 哈希不一致 " +
                        "(actual=${protectedSha.take(16)}... expected=${stamp.jarSha256.take(16)}...)"
        )
    }
    if (!gtolibProtectedLibsJar.exists() || gtolibProtectedLibsJar.length() == 0) {
        return rebuild('libs/gtolib-protected.jar 缺失')
    }
    if (!meta.fingerprint || meta.fingerprint != gtolibFingerprint || !meta.jarSha256) {
        return rebuild('libs/gtolib-protected.PROTECTED 与当前源码不一致')
    }
    def prebuiltSha = computeFileSha256(gtolibProtectedLibsJar)
    if (prebuiltSha != meta.jarSha256 || prebuiltSha != protectedSha) {
        return rebuild(
                "build/libs dev protected jar 不一致 " +
                        "(build=${protectedSha.take(16)}... libs=${prebuiltSha.take(16)}...)"
        )
    }
    // 路线 A：能构建发行单轨时，libs 发行对也必须在场且同源，否则不许跳过
    if (canProguardRelease && canSealPack) {
        def relMeta = readSidecarMeta(gtolibReleaseSidecarFile)
        if (!relMeta.jarSha256 || relMeta.fingerprint != gtolibFingerprint) {
            return rebuild('libs/gtolib-release.PROTECTED 与当前源码不一致')
        }
        if (!gtolibReleaseLibsJar.exists() || computeFileSha256(gtolibReleaseLibsJar) != relMeta.jarSha256) {
            return rebuild('libs/gtolib-release.jar 与 sidecar 哈希不一致')
        }
    }
    return true
}()
/**
 * 是否显式要求未保护（明文）gtolib。
 * 默认永远加密；无 GTOLib 源码时恒 false（只能用 libs 加密预构建）。
 * 不会因 IDE 调试器 / JDWP 自动切明文——必须显式 opt-in。
 */
ext.detectGtolibDebugMode = {
    if (!hasGtolibSources) {
        return false
    }
    if (findProperty('gtolibUnprotected') == 'true' || findProperty('gtolibDebug') == 'true') {
        return true
    }
    if (findProperty('skipGtolibProtect') == 'true') {
        return true
    }
    if (System.getenv('GTOLIB_DEBUG') == 'true' || System.getenv('PROGUARD_DISABLE') == 'true') {
        return true
    }
    if (file('.gtolib-debug').exists()) {
        return true
    }
    return false
}

ext.isGtolibDebugMode = detectGtolibDebugMode()

logger.lifecycle(
        "GTOLib pipeline: sources=${hasGtolibSources}, jarUpToDate=${isGtolibJarUpToDate}, " +
                "debugMode=${isGtolibDebugMode}, fingerprint=${gtolibFingerprint.take(12)}${gtolibFingerprint ? '…' : ''}, " +
                "proguard=${canProguard}, proguardRelease=${canProguardRelease}, sealPack=${canSealPack}, " +
                "GTOSeal=${hasGtosealSources}"
)

// 有源码时始终并入 main（IDEA 可跳转真源码；增量编译下未改文件几乎不重编）。
// isGtolibJarUpToDate 只跳过 ProGuard/Seal 等保护流水线，不再改为「只依赖 unprotected jar」。
if (hasGtolibSources) {
    // Seal 安装（installGtolibIntoModOutput）会从 main 输出剥离 com/gtolib。
    // Kotlin 增量缓存感知不到外部删除 → compileKotlin 误判 up-to-date →
    // 下次 compileJava 找不到 gtolib Kotlin 类（如 VBoxBuilder）。缺类时强制重编。
    tasks.named('compileKotlin').configure {
        outputs.upToDateWhen {
            file("${buildDir}/classes/kotlin/main/com/gtolib").exists()
        }
    }
    sourceSets.main.java.srcDir 'GTOLib/src/main/java'
    sourceSets.main.resources.srcDir 'GTOLib/src/main/resources'
    if (isGtolibJarUpToDate) {
        logger.lifecycle("GTOLib: 指纹未变 → 索引源码供 IDE/增量编译，跳过保护流水线，复用已有 jar")
    } else {
        logger.lifecycle("GTOLib: 源码有变更 → 将重新编译并走保护流水线")
    }
}
// processResources 额外拷贝明文 mixin 配置（不改整体 resources include 规则）
if (hasGtolibSources) {
    tasks.named('processResources', ProcessResources).configure {
        from('GTOLib/src/main/resources') {
            include 'gtolib.mixins.json'
            duplicatesStrategy = DuplicatesStrategy.INCLUDE
        }
    }
}

def readyBootstrap = gtolibReadyJar.get().asFile
readyBootstrap.parentFile.mkdirs()
if (!readyBootstrap.exists()) {
    readyBootstrap.bytes = new byte[0]
}

configurations {
    proguardCp
}

dependencies {
    proguardCp 'com.guardsquare:proguard-base:7.8.0'

    // 无源码：编译期依赖预构建 protected jar。
    // 有源码：始终走 sourceSets（见上），勿再 implementation(unprotected jar)，否则 IDEA 只跳进反编译。
    if (!hasGtolibSources) {
        if (gtolibProtectedLibsJar.exists()) {
            implementation(files(gtolibProtectedLibsJar))
        } else {
            throw new GradleException(
                    "缺少 GTOLib 源码（GTOLib/ submodule）且不存在 libs/gtolib-protected.jar。\n" +
                            "有权限: git submodule update --init --recursive\n" +
                            "无权限: 确保公开仓带有 libs/gtolib-protected.jar"
            )
        }
    }
}

// ---------- GTO Seal Runtime：从 GTOSeal 源码打纯 Java 版（单模组回退；开发/本地 run 用）----------
ext.sealRuntimeLibsJar = file('libs/gto-seal-runtime-1.0.jar')
ext.sealRuntimeClassesDir = layout.buildDirectory.dir('seal-runtime-classes')

if (hasGtosealSources) {
    sourceSets {
        sealRuntime {
            java.srcDir 'GTOSeal/src/main/java'
            resources.srcDir 'GTOSeal/src/main/resources'
            compileClasspath += sourceSets.main.compileClasspath
        }
    }
    tasks.named('compileSealRuntimeJava', JavaCompile).configure {
        options.encoding = 'UTF-8'
        options.release = 21
        // 仅编译；classpath 与 main 一致（含 Forge / modlauncher）
        classpath = sourceSets.main.compileClasspath
        // 避免与 main compile 抢 libs 产物顺序
        mustRunAfter 'compileJava'
    }
    // 纯 Java Runtime 仅作开发对照，输出到 build/，不覆盖 libs
    tasks.register('packSealRuntimeJar', Jar) {
        group = 'gtolib'
        description = 'GTOSeal 源码 → 纯 Java Runtime（build/ 对照，不覆盖 libs）'
        dependsOn 'compileSealRuntimeJava'
        archiveFileName = 'gto-seal-runtime-java.jar'
        destinationDirectory = layout.buildDirectory.dir('seal-runtime')
        from(sourceSets.sealRuntime.output)
        duplicatesStrategy = DuplicatesStrategy.EXCLUDE
        mustRunAfter 'compileJava', 'classes'
    }

    /**
     * 完整 Seal Runtime（含平台库）→ libs。
     * 改 gtolib 时不必有 GTOSeal 源码：沿用 Main 已提交的 libs 即可。
     * 仅在改了 Runtime 构建产物时，才从 GTOSeal/jni|dist 覆盖 libs。
     */
    tasks.register('syncSealRuntimeToLibs') {
        group = 'gtolib'
        description = '同步完整 GTO Seal Runtime → libs/gto-seal-runtime-1.0.jar'
        def candidates = [
                file('GTOSeal/jni/gto-seal-runtime-1.0.jar'),
                file('GTOSeal/dist/gto-seal-runtime-1.0.jar'),
        ]
        doLast {
            def src = candidates.find { it.exists() && it.length() > 100_000 }
            if (src != null) {
                sealRuntimeLibsJar.parentFile.mkdirs()
                Files.copy(src.toPath(), sealRuntimeLibsJar.toPath(), StandardCopyOption.REPLACE_EXISTING)
                logger.lifecycle("GTO Seal Runtime (full) → ${sealRuntimeLibsJar} (${sealRuntimeLibsJar.length()} bytes) ← ${src}")
                return
            }
            // 无 GTOSeal submodule：使用公开 libs 预构建 Runtime（改 GTOLib 的常态）
            if (sealRuntimeLibsJar.exists() && sealRuntimeLibsJar.length() > 100_000) {
                logger.lifecycle(
                        "GTO Seal Runtime: 无 GTOSeal 构建产物，沿用 libs " +
                                "(${sealRuntimeLibsJar.length()} bytes) —— 改 gtolib 无需 Seal 权限"
                )
                return
            }
            throw new GradleException(
                    "缺少完整 GTO Seal Runtime（通常 >100KB，含平台库）。\n" +
                            "优先: libs/gto-seal-runtime-1.0.jar（Main 公开预构建）\n" +
                            "或有 GTOSeal 权限时: GTOSeal/jni/gto-seal-runtime-1.0.jar\n" +
                            "禁止用纯 Java stub 顶替。"
            )
        }
    }
}

// 无 GTOSeal 源码时仍可 sync：只依赖 libs 或 GTOSeal 产物目录
if (!hasGtosealSources) {
    tasks.register('syncSealRuntimeToLibs') {
        group = 'gtolib'
        description = '确认 libs 中已有完整 Seal Runtime（无需 GTOSeal 权限）'
        doLast {
            if (sealRuntimeLibsJar.exists() && sealRuntimeLibsJar.length() > 100_000) {
                logger.lifecycle(
                        "GTO Seal Runtime: 沿用 libs (${sealRuntimeLibsJar.length()} bytes) " +
                                "—— 改 gtolib 只需 GTOLib + Main libs Runtime"
                )
                return
            }
            throw new GradleException(
                    "libs/gto-seal-runtime-1.0.jar 缺失或过小。\n" +
                            "改 gtolib 不需要 GTOSeal 权限，但 Main 仓库必须带完整 Runtime 预构建。"
            )
        }
    }
}

/**
 * 打包前清掉 classes 里的 com.gtolib，避免上次 installGtolibIntoModOutput
 * 把 Seal 抽空后的 class（UnsatisfiedLinkError "Not Impl"）污染 raw/unprotected。
 */
tasks.register('cleanGtolibClassesForPackage') {
    group = 'gtolib'
    onlyIf { hasGtolibSources && !isGtolibJarUpToDate }
    doLast {
        [file("${buildDir}/classes/java/main/com/gtolib"),
         file("${buildDir}/classes/kotlin/main/com/gtolib")].each { d ->
            if (d.exists()) {
                project.delete(d)
                logger.lifecycle("GTOLib: 已清理污染目录 ${d}")
            }
        }
    }
}

tasks.named('compileJava').configure {
    mustRunAfter 'cleanGtolibClassesForPackage'
    // 仅当「源码并入 main 一起编」时，才要求 classes 里必须有 com.gtolib。
    // 加密安装后 install 会删掉 main 里的 com.gtolib；若仍强制 false，会每次 full recompile 并容易 OOM。
    outputs.upToDateWhen {
        if (!hasGtolibSources || isGtolibJarUpToDate) {
            return true
        }
        def d = file("${buildDir}/classes/java/main/com/gtolib")
        d.exists() && d.listFiles() != null && d.listFiles().length > 0
    }
}
tasks.named('compileKotlin').configure {
    mustRunAfter 'cleanGtolibClassesForPackage'
}

tasks.register('packageGtolibJar', Jar) {
    group = 'gtolib'
    description = '从编译产物打包 com.gtolib → raw/unprotected（含 GTO Seal Manifest）'
    archiveFileName = 'gtolib-raw.jar'
    destinationDirectory = file("${buildDir}/gtolib")
    onlyIf { hasGtolibSources && !isGtolibJarUpToDate }
    dependsOn 'cleanGtolibClassesForPackage', 'classes'
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    // GTO Seal Manifest（Packager / Runtime 读取 Salt + Version）
    manifest {
        def sealSalt = Long.toString(new Random().nextLong())
        attributes([
                'GTO-Seal'         : '1',
                'GTO-Seal-Version' : gtoSealMinVersion,
                'GTO-Seal-Salt'    : sealSalt,
                // 当前 Packager 二进制仍识别下列 wire 键（与 GTO-Seal-* 同值）
                'NTPT-Version'     : gtoSealMinVersion,
                'NTPT-Salt'        : sealSalt,
        ])
    }
    from(sourceSets.main.output) {
        include 'com/gtolib/**'
        include 'gtolib.mixins.json'
        include 'gtolib.refmap.json'
        include 'gtocore.refmap.json'
        include 'META-INF/*.kotlin_module'
    }
    // AP 产物目录（可能尚未 copy 进 sourceSets.output）
    from({ file("${buildDir}/mixin") }) {
        include 'gtolib.refmap.json'
        include 'gtocore.refmap.json'
        duplicatesStrategy = DuplicatesStrategy.INCLUDE
    }
    doFirst {
        // 二次确认：打包物不能是 Seal 抽空后的 hollow class
        def sample = file("${buildDir}/classes/java/main/com/gtolib/GTOCore.class")
        if (sample.exists()) {
            def bytes = sample.bytes
            def sig = 'Not Impl'.bytes
            for (int i = 0; i < bytes.length - sig.length; i++) {
                def hit = true
                for (int j = 0; j < sig.length; j++) {
                    if (bytes[i + j] != sig[j]) { hit = false; break }
                }
                if (hit) {
                    throw new GradleException(
                            "GTOLib classes 仍含 Seal 抽空标记 (Not Impl)。请 ./gradlew clean 后重试。"
                    )
                }
            }
        }
        // 打包前再发布一次 refmap（写入 resources + mixin 目录）
        publishAndInjectGtolibRefmaps(null, true)
    }
    doLast {
        def raw = archiveFile.get().asFile
        publishAndInjectGtolibRefmaps(raw, true)
    }
}

tasks.register('copyPrebuiltGtolib') {
    group = 'gtolib'
    description = '无 submodule 时使用 libs/gtolib-protected.jar'
    onlyIf { !hasGtolibSources }
    inputs.file(gtolibProtectedLibsJar).optional()
    outputs.file(gtolibProtectedJar)
    doLast {
        if (!gtolibProtectedLibsJar.exists()) {
            throw new GradleException("libs/gtolib-protected.jar 不存在")
        }
        // 预构建路径：校验 jar 与 .PROTECTED 中 jarSha256（防漏传/被改）
        verifyGtolibSkipConsistency(gtolibProtectedLibsJar, true)
        file("${buildDir}/gtolib").mkdirs()
        [gtolibRawJar, gtolibUnprotectedJar, gtolibProtectedJar].each { p ->
            Files.copy(gtolibProtectedLibsJar.toPath(), p.get().asFile.toPath(), StandardCopyOption.REPLACE_EXISTING)
        }
        logger.lifecycle("GTOLib: 【无源码】使用 protected 成品 ${gtolibProtectedLibsJar.name}")
    }
}

tasks.register('resolveGtolibRaw') {
    group = 'gtolib'
    dependsOn {
        if (!hasGtolibSources) {
            return ['copyPrebuiltGtolib']
        }
        if (isGtolibJarUpToDate) {
            return []
        }
        return ['packageGtolibJar']
    }
    onlyIf { !hasGtolibSources || !isGtolibJarUpToDate }
    doLast {
        def raw = gtolibRawJar.get().asFile
        if (hasGtolibSources) {
            def packaged = tasks.named('packageGtolibJar', Jar).get().archiveFile.get().asFile
            if (packaged.exists() && packaged.absolutePath != raw.absolutePath) {
                Files.copy(packaged.toPath(), raw.toPath(), StandardCopyOption.REPLACE_EXISTING)
            }
            Files.copy(raw.toPath(), gtolibUnprotectedJar.get().asFile.toPath(), StandardCopyOption.REPLACE_EXISTING)
            gtolibUnprotectedLibsJar.parentFile.mkdirs()
            Files.copy(raw.toPath(), gtolibUnprotectedLibsJar.toPath(), StandardCopyOption.REPLACE_EXISTING)
            logger.lifecycle("GTOLib unprotected: ${gtolibUnprotectedJar.get().asFile.length()} bytes")
        }
        if (!raw.exists() || raw.length() == 0) {
            throw new GradleException("GTOLib raw jar 无效: ${raw}")
        }
    }
}

/**
 * 对齐旧 GTOLib：在 ProGuard/Seal 之前用 ART 把 gtolib mixin 成员 reobf 成 SRG。
 * 这样 seal 的 .prod.bin / hollow class 与 maven gtolib-forge 一样已是 f_/m_。
 */
tasks.register('reobfGtolibRaw', JavaExec) {
    group = 'gtolib'
    description = 'ART reobf gtolib-raw（旧 GTOLib: reobf 后再 encrypt）'
    onlyIf {
        hasGtolibSources && !isGtolibJarUpToDate && !detectGtolibDebugMode()
    }
    dependsOn 'resolveGtolibRaw', 'classes', 'createMinecraftArtifacts'
    classpath = configurations.artTool
    mainClass = 'net.neoforged.art.Main'
    // 参数在 doFirst 填，依赖文件存在性
    doFirst {
        def raw = gtolibRawJar.get().asFile
        def out = file("${buildDir}/gtolib/gtolib-raw-reobf.jar")
        def named = file("${buildDir}/moddev/artifacts/namedToIntermediate.tsrg")
        def mixinTsrg = file("${buildDir}/mixin/gtolib.refmap.json.mappings.tsrg")
        def repoTsrg = file('src/main/resources/gtolib.refmap.json.mappings.tsrg')
        def forgeLib = file("${buildDir}/moddev/artifacts/forge-1.20.1-${forge_version}.jar")
        if (!forgeLib.exists()) {
            // 兼容不同 MDG 产物名
            def alt = file("${buildDir}/moddev/artifacts").listFiles()?.find {
                it.name.startsWith('forge-') && it.name.endsWith('.jar')
            }
            if (alt != null) forgeLib = alt
        }
        if (!raw.exists()) throw new GradleException("reobfGtolibRaw: missing ${raw}")
        if (!named.exists()) throw new GradleException("reobfGtolibRaw: missing ${named} (run createMinecraftArtifacts)")
        // 合并/补全 ResourceLocationMixn tsrg（与 ensureMixin 一致）
        if ((!mixinTsrg.exists() || mixinTsrg.length() < 32) && repoTsrg.exists()) {
            mixinTsrg.parentFile.mkdirs()
            Files.copy(repoTsrg.toPath(), mixinTsrg.toPath(), StandardCopyOption.REPLACE_EXISTING)
        }
        if (!mixinTsrg.exists()) {
            mixinTsrg.parentFile.mkdirs()
            mixinTsrg.text = ''
        }
        ensureResourceLocationMixnTsrg(mixinTsrg)
        if (out.exists()) out.delete()
        args = [
                '--input', raw.absolutePath,
                '--output', out.absolutePath,
                '--names', named.absolutePath,
                '--names', mixinTsrg.absolutePath,
        ]
        // 必须带上继承关系：否则 invokevirtual CleanroomFilterType.getSerializedName
        // 不会变成 m_7912_，而 gtocore 类外层 reobf 后只剩 m_7912_ → NoSuchMethodError
        def libs = []
        if (forgeLib != null && forgeLib.exists()) libs << forgeLib
        // 本工程已编译的 gtocore 类（含 CleanroomFilterType 等）
        def gtocoreClasses = file("${buildDir}/classes/java/main")
        if (gtocoreClasses.exists()) libs << gtocoreClasses
        def gtocoreKotlin = file("${buildDir}/classes/kotlin/main")
        if (gtocoreKotlin.exists()) libs << gtocoreKotlin
        // jarJar 依赖（GTCEu 等，IFilterType / IFusionCasingType）
        configurations.runtimeClasspath.files.findAll { f ->
            def n = f.name.toLowerCase()
            (n.contains('gtceu') || n.contains('gtmthings') || n.contains('datasynclib') ||
                    n.contains('ae2') || n.contains('appliedenergistics')) && n.endsWith('.jar')
        }.each { libs << it }
        libs.unique().each { args += ['--lib', it.absolutePath] }
        logger.lifecycle(
                "GTOLib ART reobf: ${raw.name} → ${out.name}; " +
                        "names=${named.name}+${mixinTsrg.name}; libs=${libs.size()}"
        )
    }
    doLast {
        def raw = gtolibRawJar.get().asFile
        def out = file("${buildDir}/gtolib/gtolib-raw-reobf.jar")
        if (!out.exists() || out.length() < 1024) {
            throw new GradleException("reobfGtolibRaw: ART 未写出 ${out}")
        }
        // 校验 ResourceLocationMixn 已是 SRG（旧官方 jar 合同）
        def zf = new java.util.zip.ZipFile(out)
        try {
            def e = zf.getEntry('com/gtolib/mixin/mc/ResourceLocationMixn.class')
            if (e == null) throw new GradleException("reobfGtolibRaw: 缺 ResourceLocationMixn.class")
            def text = new String(zf.getInputStream(e).bytes, 'ISO-8859-1')
            if (!text.contains('f_135804_') || !text.contains('m_245413_') || text.contains('assertValidNamespace')) {
                throw new GradleException(
                        "reobfGtolibRaw: ResourceLocationMixn 未正确 reobf 成 SRG " +
                                "(f_135804_=${text.contains('f_135804_')} m_245413_=${text.contains('m_245413_')} " +
                                "assertValidNamespace=${text.contains('assertValidNamespace')})"
                )
            }
        } finally {
            zf.close()
        }
        // 只覆盖 raw（ProGuard/Seal prod 链消费 SRG 字节码）。
        // unprotected 必须保持 named：它是 Seal Packager 的 dev jar → .dev.bin，
        // userdev 运行时 Minecraft 是官方名，SRG 的 @Shadow(m_xxx_) 会
        // "was not located in the target class" 崩溃（MinecraftMixin m_91294_ 事故）。
        Files.copy(out.toPath(), raw.toPath(), StandardCopyOption.REPLACE_EXISTING)
        logger.lifecycle("GTOLib ART reobf OK → raw 已是 SRG (ResourceLocationMixn f_/m_)；unprotected 保持 named 供 dev")
    }
}

// 无 artTool 配置时补上（与 MDG 同版 ART）
if (configurations.findByName('artTool') == null) {
    configurations.create('artTool')
    dependencies {
        artTool 'net.neoforged:AutoRenamingTool:2.0.17:all'
    }
}

/** 混淆字典（dev/release 两条 ProGuard 链共用；确定性 shuffle） */
ext.ensureProguardDictionaries = {
    def dictFile = file("${gtolibProtectDir}/my_dict.txt")
    if (!dictFile.exists()) {
        dictFile.parentFile.mkdirs()
        dictFile.text = (('a'..'z').collectMany { l -> (0..9).collect { n -> "${l}${n}" } }).join('\n') + '\n'
    }
    def rnd = new SecureRandom(998244353L * (1e9 + 7) as byte[])
    ['my_class_names_shuffled.txt', 'my_package_names_shuffled.txt', 'my_dict_names_shuffled.txt'].each { name ->
        def lines = Files.readAllLines(dictFile.toPath())
        Collections.shuffle(lines, rnd)
        Files.write(file("${buildDir}/gtolib/${name}").toPath(), lines)
    }
}

/** 生成 ProGuard 附加配置：libraryjars + 字典 + mapping 输出（按链取不同 mapping 文件名） */
ext.writeProguardExtraFile = { File target, String mappingName ->
    def libArgs = new StringBuilder()
    def javaHome = System.getProperty('java.home')
    def jmod = new File("${javaHome}/jmods/java.base.jmod")
    def rt = new File("${javaHome}/lib/rt.jar")
    if (rt.exists()) {
        libArgs.append("-libraryjars '${rt.absolutePath.replace('\\', '/')}'\n")
    } else if (jmod.exists()) {
        libArgs.append("-libraryjars '${jmod.absolutePath.replace('\\', '/')}'\n")
    }
    def seen = new HashSet<String>()
    project.configurations.findAll { it.name.endsWith('Classpath') && it.canBeResolved }.each { config ->
        try {
            config.resolve().each { f ->
                if (f.name.endsWith('.jar') && seen.add(f.absolutePath)) {
                    libArgs.append("-libraryjars '${f.absolutePath.replace('\\', '/')}'\n")
                }
            }
        } catch (Exception ignored) {
        }
    }
    def abs = { String name -> file("${buildDir}/gtolib/${name}").absolutePath.replace('\\', '/') }
    libArgs.append("-classobfuscationdictionary '${abs('my_class_names_shuffled.txt')}'\n")
    libArgs.append("-packageobfuscationdictionary '${abs('my_package_names_shuffled.txt')}'\n")
    libArgs.append("-obfuscationdictionary '${abs('my_dict_names_shuffled.txt')}'\n")
    libArgs.append("-printmapping '${abs(mappingName)}'\n")
    target.text = libArgs.toString()
}

/**
 * 路线 A：扫描 gtocore（非 com.gtolib）编译产物常量池中的 com.gtolib 引用，
 * 生成发行混淆的 keep 文件。这些类是 gtocore 字节码的运行时链接面，
 * 发行单轨里必须保住「类名 + public/protected 成员名」，其余内部类放开混淆。
 */
ext.writeReleaseKeepFromGtocoreRefs = { File target ->
    def refs = new TreeSet<String>()
    def reSlash = java.util.regex.Pattern.compile('com/gtolib/[A-Za-z0-9_$/]+')
    def reDot = java.util.regex.Pattern.compile('com\\.gtolib\\.[A-Za-z0-9_$.]+')
    def roots = [file("${buildDir}/classes/java/main"), file("${buildDir}/classes/kotlin/main")]
    def scanned = 0
    roots.each { root ->
        if (!root.exists()) return
        root.eachFileRecurse { f ->
            if (!f.isFile() || !f.name.endsWith('.class')) return
            def rel = root.toPath().relativize(f.toPath()).toString().replace('\\', '/')
            if (rel.startsWith('com/gtolib/')) return
            scanned++
            def text = new String(f.bytes, 'ISO-8859-1')
            def m = reSlash.matcher(text)
            while (m.find()) refs.add(m.group().replace('/', '.'))
            m = reDot.matcher(text)
            while (m.find()) refs.add(m.group())
        }
    }
    if (scanned == 0) {
        throw new GradleException(
                "writeReleaseKeepFromGtocoreRefs: 找不到已编译的 gtocore 类（需先 classes）"
        )
    }
    // 源码 import 声明也并入：内联常量/未使用 import 在字节码里无引用，
    // 但 verifyMainGtolibImportsAgainstJar 会要求它们在发行 jar 内按名可解析
    def importRe = ~/^import\s+(static\s+)?(com\.gtolib\.[A-Za-z0-9_.]+)\s*;?\s*$/
    [file('src/main/java'), file('src/main/kotlin')].findAll { it.exists() }.each { root ->
        root.eachFileRecurse { f ->
            if (!f.isFile() || !(f.name.endsWith('.java') || f.name.endsWith('.kt'))) return
            f.eachLine { line ->
                def m = importRe.matcher(line.trim())
                if (!m.find()) return
                def fqn = m.group(2)
                if (fqn.endsWith('.*')) return // 通配 import 由字节码扫描覆盖实际用到的类
                // static/Kotlin 成员 import 的末段可能是成员名：父级一并纳入
                // （父级若是包名，keepnames 空匹配无害）
                def i = fqn.lastIndexOf('.')
                if (i > 'com.gtolib'.length()) refs.add(fqn.substring(0, i))
                refs.add(fqn)
            }
        }
    }
    def sb = new StringBuilder('# generated: gtocore 字节码+import 对 com.gtolib 的引用面（发行单轨保名）\n')
    def kept = 0
    refs.each { raw ->
        def fqn = raw
        while (fqn.endsWith('.') || fqn.endsWith('$')) fqn = fqn.substring(0, fqn.length() - 1)
        if (fqn.length() <= 'com.gtolib.'.length() || fqn.contains('..')) return
        sb.append("-keepnames class ${fqn} { public protected *; }\n")
        kept++
    }
    target.text = sb.toString()
    logger.lifecycle(
            "GTOLib release: gtocore 引用面 ${kept} 项 → ${target.name}（扫描 ${scanned} class）"
    )
    return kept
}

tasks.register('proguardGtolib', JavaExec) {
    group = 'gtolib'
    onlyIf {
        hasGtolibSources && !isGtolibJarUpToDate && canProguard && !detectGtolibDebugMode()
    }
    dependsOn 'reobfGtolibRaw', 'resolveGtolibRaw', 'classes'
    classpath = configurations.proguardCp
    mainClass = 'proguard.ProGuard'

    doFirst {
        file("${buildDir}/gtolib").mkdirs()
        ensureProguardDictionaries()
        writeProguardExtraFile(file("${buildDir}/gtolib/proguard-extra.pro"), 'gtolib-mapping.txt')

        def inJar = gtolibRawJar.get().asFile.absolutePath.replace('\\', '/')
        def outJar = gtolibPgJar.get().asFile.absolutePath.replace('\\', '/')
        args = [
                "@${file("${gtolibProtectDir}/proguard-rules.pro").absolutePath}",
                "@${file("${buildDir}/gtolib/proguard-extra.pro").absolutePath}",
                "-injars", inJar,
                "-outjars", outJar,
        ]
    }
}

/**
 * 路线 A：发行单轨 ProGuard —— 内部类名/包名参与混淆（-repackageclasses）。
 * keep 面 = proguard-release-rules.pro（api/utils/mixin/入口/注解类）
 *         + build/gtolib/proguard-release-keep.pro（gtocore 字节码实际引用面）。
 */
tasks.register('proguardGtolibRelease', JavaExec) {
    group = 'gtolib'
    description = '发行单轨 ProGuard：内部类名/包名混淆（路线 A）'
    onlyIf {
        hasGtolibSources && !isGtolibJarUpToDate && canProguardRelease && !detectGtolibDebugMode()
    }
    dependsOn 'reobfGtolibRaw', 'resolveGtolibRaw', 'classes'
    mustRunAfter 'proguardGtolib'
    classpath = configurations.proguardCp
    mainClass = 'proguard.ProGuard'

    doFirst {
        file("${buildDir}/gtolib").mkdirs()
        ensureProguardDictionaries()
        def extraFile = file("${buildDir}/gtolib/proguard-release-extra.pro")
        // mapping 留在 build/gtolib（gitignored）：崩溃反混淆用，发版时自行归档，勿公开
        writeProguardExtraFile(extraFile, 'gtolib-release-mapping.txt')
        def keepFile = file("${buildDir}/gtolib/proguard-release-keep.pro")
        writeReleaseKeepFromGtocoreRefs(keepFile)

        def inJar = gtolibRawJar.get().asFile.absolutePath.replace('\\', '/')
        def outJar = gtolibPgReleaseJar.get().asFile.absolutePath.replace('\\', '/')
        args = [
                "@${file("${gtolibProtectDir}/proguard-release-rules.pro").absolutePath}",
                "@${keepFile.absolutePath}",
                "@${extraFile.absolutePath}",
                "-injars", inJar,
                "-outjars", outJar,
        ]
    }

    doLast {
        def out = gtolibPgReleaseJar.get().asFile
        if (!out.exists() || out.length() < 1024) {
            throw new GradleException("proguardGtolibRelease: 未产出 ${out}")
        }
        // 混淆必须真的发生：与 named unprotected 对比 class 路径集合
        def unprot = gtolibUnprotectedJar.get().asFile
        if (unprot.exists() && unprot.length() > 0) {
            def listCls = { File jf ->
                def s = new HashSet<String>()
                new java.util.zip.ZipFile(jf).withCloseable { zf ->
                    zf.entries().each { e ->
                        if (!e.isDirectory() && e.name.startsWith('com/gtolib') && e.name.endsWith('.class')) {
                            s.add(e.name)
                        }
                    }
                }
                return s
            }
            def relNames = listCls(out)
            def devNames = listCls(unprot)
            def renamed = relNames - devNames
            def hidden = devNames - relNames
            if (renamed.isEmpty() || hidden.isEmpty()) {
                throw new GradleException(
                        "proguardGtolibRelease: 类名混淆未生效（renamed=${renamed.size()} hidden=${hidden.size()}）。\n" +
                                "检查 proguard-release-rules.pro 的 keep 面是否过宽（keepnames 是否被误加回）。"
                )
            }
            logger.lifecycle(
                    "GTOLib release ProGuard OK: ${relNames.size()} class，" +
                            "改名/隐藏 ${hidden.size()}，保名 ${relNames.size() - renamed.size()}"
            )
        }
    }
}

/**
 * 将 GTO Seal 清单字段写入 jar（ProGuard 后可能丢失；Packager 依赖 Salt）。
 * 同时写入 GTO-Seal-* 与当前 Packager 仍识别的 wire 键（同值）。
 */
ext.stampGtolibJarForSeal = { File srcJar, File destJar, String salt, String version ->
    destJar.parentFile.mkdirs()
    def sealKeys = [
            'GTO-Seal:', 'GTO-Seal-Salt:', 'GTO-Seal-Version:',
            'NTPT-Salt:', 'NTPT-Version:',
    ]
    def zis = new java.util.zip.ZipInputStream(new FileInputStream(srcJar))
    def zos = new java.util.zip.ZipOutputStream(new FileOutputStream(destJar))
    def wroteManifest = false
    java.util.zip.ZipEntry e
    while ((e = zis.nextEntry) != null) {
        if (e.name.equalsIgnoreCase('META-INF/MANIFEST.MF')) {
            def lines = new String(zis.readAllBytes(), 'UTF-8').readLines()
            def kept = lines.findAll { line ->
                def t = line.trim()
                if (t.isEmpty()) return true
                !sealKeys.any { t.startsWith(it) }
            }
            while (kept && kept[-1].trim().isEmpty()) kept.remove(kept.size() - 1)
            if (kept.isEmpty() || !kept[0].startsWith('Manifest-Version')) {
                kept = ['Manifest-Version: 1.0'] + kept
            }
            kept << 'GTO-Seal: 1'
            kept << "GTO-Seal-Salt: ${salt}"
            kept << "GTO-Seal-Version: ${version}"
            kept << "NTPT-Salt: ${salt}"
            kept << "NTPT-Version: ${version}"
            kept << ''
            zos.putNextEntry(new java.util.zip.ZipEntry('META-INF/MANIFEST.MF'))
            zos.write(kept.join('\n').getBytes('UTF-8'))
            zos.closeEntry()
            wroteManifest = true
        } else {
            zos.putNextEntry(new java.util.zip.ZipEntry(e.name))
            zis.transferTo(zos)
            zos.closeEntry()
        }
        zis.closeEntry()
    }
    if (!wroteManifest) {
        zos.putNextEntry(new java.util.zip.ZipEntry('META-INF/MANIFEST.MF'))
        zos.write([
                'Manifest-Version: 1.0',
                'GTO-Seal: 1',
                "GTO-Seal-Salt: ${salt}",
                "GTO-Seal-Version: ${version}",
                "NTPT-Salt: ${salt}",
                "NTPT-Version: ${version}",
                ''
        ].join('\n').getBytes('UTF-8'))
        zos.closeEntry()
    }
    zos.close()
    zis.close()
}

/**
 * GTO Seal Packager：在 ProGuard 之后加密 class（需 Seal Runtime 运行时解密）。
 *
 * 调用约定:
 *   java -jar gto-seal-packager.jar <prod.jar> <dev.jar> <output.jar>
 * - prod：混淆后 jar（或未跑 ProGuard 时的 raw）
 * - dev ：明文 unprotected jar（必须真实存在，Packager 会读取）
 * - output：加密输出
 */
tasks.register('sealPackGtolib', Exec) {
    group = 'gtolib'
    description = 'GTO Seal Packager 加密 gtolib'
    onlyIf {
        hasGtolibSources && !isGtolibJarUpToDate && canSealPack && !detectGtolibDebugMode()
    }
    // 必须先 reobf（对齐旧 GTOLib: reobfJar.finalizedBy encryptJar）
    dependsOn {
        canProguard ? ['reobfGtolibRaw', 'proguardGtolib'] : ['reobfGtolibRaw', 'resolveGtolibRaw']
    }
    inputs.file(sealPackagerJar).withPropertyName('sealPackager')
    inputs.files(gtolibPgJar, gtolibRawJar)
            .withPropertyName('prodJarCandidates').optional()
    inputs.file(gtolibUnprotectedJar).withPropertyName('devJar')
    inputs.property('gtoSealMinVersion', gtoSealMinVersion)
    outputs.file(file("${buildDir}/gtolib/gtolib-sealed.jar"))
    outputs.upToDateWhen { findProperty('gtolibRebuild') != 'true' }

    doFirst {
        def pg = gtolibPgJar.get().asFile
        def raw = gtolibRawJar.get().asFile
        def unprotected = gtolibUnprotectedJar.get().asFile
        def prodSrc = (pg.exists() && pg.length() > 0) ? pg : raw
        // dev jar 只能用 named 的 unprotected；raw 经 reobf 已是 SRG，
        // 进 .dev.bin 会让 userdev @Shadow 找不到目标（m_91294_ 事故），不允许回退
        def devSrc = unprotected
        if (!prodSrc.exists() || prodSrc.length() == 0) {
            throw new GradleException("GTO Seal Packager prod jar 无效: ${prodSrc}")
        }
        if (!devSrc.exists() || devSrc.length() == 0) {
            throw new GradleException("GTO Seal Packager dev jar 无效（需 named 的 gtolib-unprotected.jar）: ${devSrc}")
        }

        def salt = Long.toString(new Random().nextLong())
        def version = gtoSealMinVersion
        def stampedProd = file("${buildDir}/gtolib/gtolib-seal-input.jar")
        def stampedDev = file("${buildDir}/gtolib/gtolib-seal-dev.jar")
        def out = file("${buildDir}/gtolib/gtolib-sealed.jar")
        out.parentFile.mkdirs()
        if (out.exists()) out.delete()

        // prod / dev 写入同一 Salt，供 Seal Runtime 解密
        stampGtolibJarForSeal(prodSrc, stampedProd, salt, version)
        stampGtolibJarForSeal(devSrc, stampedDev, salt, version)
        logger.lifecycle(
                "GTO Seal: Salt=${salt} Version=${version} | prod=${prodSrc.name} dev=${devSrc.name}"
        )

        // Gradle 9+：使用 Exec 任务 API（project.exec 已移除）
        executable 'java'
        args '-jar', sealPackagerJar.absolutePath,
                stampedProd.absolutePath, stampedDev.absolutePath, out.absolutePath
    }

    doLast {
        def out = file("${buildDir}/gtolib/gtolib-sealed.jar")
        if (!out.exists() || out.length() < 1024) {
            throw new GradleException(
                    "GTO Seal Packager 未生成有效输出 (${out.exists() ? out.length() : 0} bytes)。\n" +
                            "约定: java -jar packager.jar <prod.jar> <dev.jar> <output.jar>"
            )
        }
        // userdev 走 .dev.bin：每个 bin 必须有同路径 hollow .class，否则 ClassNotFound
        def zf = new java.util.zip.ZipFile(out)
        try {
            def names = zf.entries().collect { it.name } as Set
            def missing = []
            names.findAll { it.startsWith('native0/native/') && it.endsWith('.dev.bin') }.each { bin ->
                def cls = bin.substring('native0/native/'.length(), bin.length() - '.dev.bin'.length()) + '.class'
                if (!names.contains(cls)) {
                    missing << cls
                }
            }
            if (missing) {
                def sample = missing.take(12).join('\n  ')
                throw new GradleException(
                        "GTO Seal 输出不完整：${missing.size()} 个 .dev.bin 缺少 hollow .class shell。\n" +
                                "常见原因：ProGuard -repackageclasses / 类名混淆导致 prod 路径与 dev 不一致。\n" +
                                "样例:\n  ${sample}"
                )
            }
            def nDev = names.count { it.endsWith('.dev.bin') }
            def nProd = names.count { it.endsWith('.prod.bin') }
            def nCls = names.count { it.startsWith('com/gtolib/') && it.endsWith('.class') }
            logger.lifecycle(
                    "GTO Seal Packager OK → ${out.name} (${out.length()} bytes) " +
                            "class=${nCls} dev.bin=${nDev} prod.bin=${nProd}"
            )
        } finally {
            zf.close()
        }
    }
}

/**
 * 路线 A：发行单轨 Seal 打包。
 * prod = dev = 混淆后的 release jar（同一 Salt 盖章两份副本）→ 输出自洽：
 * hollow shell / .prod.bin 路径 / 字节码内引用全部使用混淆名。
 * 打包完成后剥除全部 .dev.bin —— 发行包不携带 named 或任何 dev 轨字节码。
 */
tasks.register('sealPackGtolibRelease', Exec) {
    group = 'gtolib'
    description = 'GTO Seal Packager 加密发行单轨 gtolib（类名混淆、无 dev.bin）'
    onlyIf {
        hasGtolibSources && !isGtolibJarUpToDate && canSealPack && canProguardRelease && !detectGtolibDebugMode()
    }
    dependsOn 'proguardGtolibRelease'
    mustRunAfter 'sealPackGtolib'
    inputs.file(sealPackagerJar)
    inputs.files(gtolibPgReleaseJar)
    inputs.property('gtoSealMinVersion', gtoSealMinVersion)
    outputs.file(gtolibSealedReleaseJar)
    outputs.upToDateWhen { findProperty('gtolibRebuild') != 'true' }

    doFirst {
        def pg = gtolibPgReleaseJar.get().asFile
        if (!pg.exists() || pg.length() == 0) {
            throw new GradleException("sealPackGtolibRelease: release ProGuard jar 无效: ${pg}")
        }
        def salt = Long.toString(new Random().nextLong())
        def version = gtoSealMinVersion
        def stampedProd = file("${buildDir}/gtolib/gtolib-release-seal-input.jar")
        def stampedDev = file("${buildDir}/gtolib/gtolib-release-seal-dev.jar")
        def out = gtolibSealedReleaseJar.get().asFile
        out.parentFile.mkdirs()
        if (out.exists()) out.delete()

        stampGtolibJarForSeal(pg, stampedProd, salt, version)
        stampGtolibJarForSeal(pg, stampedDev, salt, version)
        logger.lifecycle("GTO Seal(release): Salt=${salt} 单轨 prod=dev=${pg.name}")

        executable 'java'
        args '-jar', sealPackagerJar.absolutePath,
                stampedProd.absolutePath, stampedDev.absolutePath, out.absolutePath
    }

    doLast {
        def out = gtolibSealedReleaseJar.get().asFile
        if (!out.exists() || out.length() < 1024) {
            throw new GradleException(
                    "GTO Seal Packager(release) 未生成有效输出 (${out.exists() ? out.length() : 0} bytes)"
            )
        }
        // 剥除 .dev.bin：发行包只保留 hollow shell + .prod.bin + 明文 mixin
        def tmp = new File(out.absolutePath + '.strip')
        def zis = new java.util.zip.ZipInputStream(new FileInputStream(out))
        def zos = new java.util.zip.ZipOutputStream(new FileOutputStream(tmp))
        java.util.zip.ZipEntry e
        def stripped = 0
        while ((e = zis.nextEntry) != null) {
            if (e.name.endsWith('.dev.bin')) {
                stripped++
                zis.closeEntry()
                continue
            }
            zos.putNextEntry(new java.util.zip.ZipEntry(e.name))
            zis.transferTo(zos)
            zos.closeEntry()
            zis.closeEntry()
        }
        zos.close()
        zis.close()
        Files.move(tmp.toPath(), out.toPath(), StandardCopyOption.REPLACE_EXISTING)

        // 自洽校验：路径键三方对齐 + 无 dev 轨 + mixin 明文 SRG
        def zf = new java.util.zip.ZipFile(out)
        try {
            def names = zf.entries().collect { it.name } as Set
            def leftoverDev = names.count { it.endsWith('.dev.bin') }
            if (leftoverDev > 0) {
                throw new GradleException("release 包剥除 dev.bin 失败：仍剩 ${leftoverDev} 个")
            }
            def missing = []
            names.findAll { it.startsWith('native0/native/') && it.endsWith('.prod.bin') }.each { bin ->
                def cls = bin.substring('native0/native/'.length(), bin.length() - '.prod.bin'.length()) + '.class'
                if (!names.contains(cls)) {
                    missing << cls
                }
            }
            if (missing) {
                def sample = missing.take(12).join('\n  ')
                throw new GradleException(
                        "release Seal 输出不自洽：${missing.size()} 个 .prod.bin 缺少同路径 hollow .class。\n样例:\n  ${sample}"
                )
            }
            def rlm = zf.getEntry('com/gtolib/mixin/mc/ResourceLocationMixn.class')
            if (rlm == null) {
                throw new GradleException("release 包缺少明文 mixin: ResourceLocationMixn.class（keep 面/包名被混淆？）")
            }
            def rlmText = new String(zf.getInputStream(rlm).bytes, 'ISO-8859-1')
            if (!rlmText.contains('f_135804_')) {
                throw new GradleException("release 包 ResourceLocationMixn 非 SRG（reobf 链断了）")
            }
            def nProd = names.count { it.endsWith('.prod.bin') }
            def nCls = names.count { it.startsWith('com/gtolib') && it.endsWith('.class') }
            logger.lifecycle(
                    "GTO Seal(release) OK → ${out.name} (${out.length()} bytes) " +
                            "class=${nCls} prod.bin=${nProd} 已剥除 dev.bin=${stripped}"
            )
        } finally {
            zf.close()
        }
    }
}

/**
 * 生成加密 gtolib（默认）并同步 libs 预构建。
 * 明文模式（-PgtolibUnprotected 等）只写 build/，绝不覆盖 libs。
 */
tasks.register('buildGtolibProtected') {
    group = 'gtolib'
    description = '生成加密 gtolib-protected.jar（ProGuard+Seal）并同步 libs/ 预构建；明文仅 -PgtolibUnprotected'
    dependsOn {
        if (!hasGtolibSources) {
            return ['copyPrebuiltGtolib']
        }
        if (isGtolibJarUpToDate) {
            return []
        }
        def steps = ['resolveGtolibRaw', 'proguardGtolib']
        if (canProguardRelease) {
            steps << 'proguardGtolibRelease'
        }
        if (canSealPack) {
            steps << 'sealPackGtolib'
            if (canProguardRelease) {
                steps << 'sealPackGtolibRelease'
            }
        }
        return steps
    }
    // 刷新 Runtime 校验（改 gtolib 不需要 GTOSeal 源码，沿用 libs）
    if (tasks.findByName('syncSealRuntimeToLibs') != null) {
        dependsOn 'syncSealRuntimeToLibs'
    }
    inputs.property('gtolibFingerprint', { gtolibFingerprint })
    inputs.property('gtolibDebugMode', { detectGtolibDebugMode() })
    inputs.property('hasGtolibSources', hasGtolibSources)
    inputs.property('canProguard', canProguard)
    inputs.property('canProguardRelease', canProguardRelease)
    inputs.property('canSealPack', canSealPack)
    inputs.property('gtoSealMinVersion', gtoSealMinVersion)
    if (hasGtolibSources) {
        inputs.files(
                gtolibRawJar,
                gtolibUnprotectedJar,
                gtolibPgJar,
                file("${buildDir}/gtolib/gtolib-sealed.jar"),
                gtolibPgReleaseJar,
                gtolibSealedReleaseJar
        ).withPropertyName('candidateBuildJars').optional()
        inputs.file(sealRuntimeLibsJar).withPropertyName('sealRuntime').optional()
        inputs.file('GTOLib/src/main/resources/gtolib.mixins.json')
                .withPropertyName('mixinConfig').optional()
    } else {
        inputs.file(gtolibProtectedLibsJar).withPropertyName('prebuiltProtectedJar')
        inputs.file(file('libs/gtolib-protected.PROTECTED'))
                .withPropertyName('prebuiltProtectedMetadata').optional()
    }
    outputs.file(gtolibProtectedJar)
    if (hasGtolibSources && !detectGtolibDebugMode()) {
        outputs.file(gtolibProtectedLibsJar)
        outputs.file(file('libs/gtolib-protected.PROTECTED'))
        outputs.file(gtolibStampFile)
        if (canProguardRelease && canSealPack) {
            outputs.file(gtolibReleaseJar)
            outputs.file(gtolibReleaseLibsJar)
            outputs.file(gtolibReleaseSidecarFile)
        }
    }
    outputs.upToDateWhen { findProperty('gtolibRebuild') != 'true' }

    doLast {
        def protectedFile = gtolibProtectedJar.get().asFile
        def unprotected = gtolibUnprotectedJar.get().asFile
        def sealed = file("${buildDir}/gtolib/gtolib-sealed.jar")
        def pg = gtolibPgJar.get().asFile
        def raw = gtolibRawJar.get().asFile
        def unprotectedMode = hasGtolibSources && detectGtolibDebugMode()

        if (hasGtolibSources && isGtolibJarUpToDate) {
            logger.lifecycle("GTOLib: jar 已是最新 (stamp 命中)，跳过打包/保护 → 执行一致性校验")
            verifyGtolibSkipConsistency(protectedFile, true)
            // 路线 A：发行单轨预构建对也必须同源有效
            if (canProguardRelease && canSealPack) {
                verifyGtolibReleasePair()
            }
            return
        }

        if (unprotectedMode) {
            // 明文：仅本地 build/，禁止写入 libs/gtolib-protected.jar
            def src = (unprotected.exists() && unprotected.length() > 0) ? unprotected :
                    ((raw.exists() && raw.length() > 0) ? raw : null)
            if (src == null) {
                throw new GradleException("无法生成明文 gtolib（缺 unprotected/raw）")
            }
            protectedFile.parentFile.mkdirs()
            Files.copy(src.toPath(), protectedFile.toPath(), StandardCopyOption.REPLACE_EXISTING)
            injectGtolibMixinConfig(protectedFile)
            publishAndInjectGtolibRefmaps(protectedFile, true)
            // 作废 stamp：避免下次默认加密构建把明文 jar 当成 up-to-date 跳过
            def stamp = gtolibStampFile.get().asFile
            if (stamp.exists()) {
                stamp.delete()
            }
            logger.lifecycle(
                    "GTOLib: 【未加密/本地】${protectedFile} (${protectedFile.length()} bytes) " +
                            "— 未写入 libs；已清除 stamp（下次默认构建将重新加密）"
            )
            return
        }

        // 加密档：必须是 Seal 抽空成品（完整保护）。
        // 无源码路径由 copyPrebuiltGtolib 已写入 protectedFile。
        def src
        if (!hasGtolibSources) {
            src = protectedFile.exists() && protectedFile.length() > 0 ? protectedFile : gtolibProtectedLibsJar
        } else if (sealed.exists() && sealed.length() > 0) {
            src = sealed
        } else if (pg.exists() && pg.length() > 0) {
            // ProGuard 完成但 Seal 未跑：允许仅当 packager 不可用（本地缺工具）时降级
            if (canSealPack) {
                throw new GradleException(
                        "GTO Seal Packager 已配置但未产出 gtolib-sealed.jar。\n" +
                                "请检查 sealPackGtolib 日志，或 ./gradlew -PgtolibRebuild=true buildGtolibProtected"
                )
            }
            src = pg
            logger.warn("GTOLib: 无 Seal Packager，降级为仅 ProGuard（不应提交到公开 libs）")
        } else {
            throw new GradleException(
                    "无法生成加密 gtolib-protected.jar（缺 sealed/proguard 产物）。\n" +
                            "需要 GTOLib 源码 + protect/ 工具链；无权限者请使用 libs 预构建。"
            )
        }
        if (src == null || !src.exists() || src.length() == 0) {
            throw new GradleException("无法生成 gtolib-protected.jar")
        }
        if (unprotected.exists() && src.length() == unprotected.length() && hasGtolibSources) {
            throw new GradleException("protected 与 unprotected 同大小，疑似未加密，拒绝写入")
        }

        protectedFile.parentFile.mkdirs()
        Files.copy(src.toPath(), protectedFile.toPath(), StandardCopyOption.REPLACE_EXISTING)
        injectGtolibMixinConfig(protectedFile)
        // Seal/ProGuard 后 jar 内往往没有 refmap：有源码重建时注入完整 refmap
        publishAndInjectGtolibRefmaps(protectedFile, hasGtolibSources)
        def jarSha = computeFileSha256(protectedFile)

        // 有源码 + 加密：同步公开预构建 libs/（无权限消费方唯一入口）
        if (hasGtolibSources && protectedFile.exists()) {
            if (!sealRuntimeLibsJar.exists() || sealRuntimeLibsJar.length() < 100_000) {
                throw new GradleException(
                        "libs/gto-seal-runtime-1.0.jar 必须是完整 Runtime（>100KB）。\n" +
                                "请先: ./gradlew syncSealRuntimeToLibs"
                )
            }
            gtolibProtectedLibsJar.parentFile.mkdirs()
            Files.copy(protectedFile.toPath(), gtolibProtectedLibsJar.toPath(), StandardCopyOption.REPLACE_EXISTING)
            def prebuiltSha = writeGtolibProtectedSidecar(gtolibProtectedLibsJar, gtolibFingerprint)
            if (prebuiltSha != jarSha) {
                throw new GradleException(
                        "GTOLib dev 同步失败：build 与 libs protected jar 字节不一致。\n" +
                                "  build jarSha256 = ${jarSha}\n" +
                                "  libs  jarSha256 = ${prebuiltSha}"
                )
            }
            logger.lifecycle(
                    "GTOLib: 已同步 libs/gtolib-protected.jar + .PROTECTED " +
                            "(${gtolibProtectedLibsJar.length()} bytes); " +
                            "runtime=${sealRuntimeLibsJar.length()} bytes"
            )
        }

        if (hasGtolibSources && gtolibFingerprint) {
            writeGtolibStamp(gtolibFingerprint, jarSha)
            logger.lifecycle(
                    "GTOLib: 已写入 stamp fp=${gtolibFingerprint.take(16)}… " +
                            "jarSha=${jarSha.take(16)}…"
            )
        }

        // —— 路线 A：发行单轨产物（内部类名混淆、无 dev.bin），玩家 jar 的唯一来源 ——
        if (hasGtolibSources) {
            def sealedRel = gtolibSealedReleaseJar.get().asFile
            def releaseFile = gtolibReleaseJar.get().asFile
            if (canProguardRelease && canSealPack) {
                if (!sealedRel.exists() || sealedRel.length() == 0) {
                    throw new GradleException(
                            "发行单轨未产出 gtolib-sealed-release.jar（sealPackGtolibRelease 未跑成）。\n" +
                                    "请检查其日志，或 ./gradlew -PgtolibRebuild=true buildGtolibProtected"
                    )
                }
                releaseFile.parentFile.mkdirs()
                Files.copy(sealedRel.toPath(), releaseFile.toPath(), StandardCopyOption.REPLACE_EXISTING)
                injectGtolibMixinConfig(releaseFile)
                publishAndInjectGtolibRefmaps(releaseFile, false)
                // 先验 gtocore 链接面，再同步 libs——校验失败时不落地半成品发行对
                verifyMainGtolibImportsAgainstJar(releaseFile)
                def releaseSha = computeFileSha256(releaseFile)
                gtolibReleaseLibsJar.parentFile.mkdirs()
                Files.copy(releaseFile.toPath(), gtolibReleaseLibsJar.toPath(), StandardCopyOption.REPLACE_EXISTING)
                def releasePrebuiltSha = writeGtolibSidecar(
                        gtolibReleaseLibsJar, gtolibReleaseSidecarFile, gtolibFingerprint,
                        'proguard-release+gto-seal(single-track,no-dev-bin)'
                )
                if (releasePrebuiltSha != releaseSha) {
                    throw new GradleException(
                            "GTOLib release 同步失败：build 与 libs release jar 字节不一致。\n" +
                                    "  build jarSha256 = ${releaseSha}\n" +
                                    "  libs  jarSha256 = ${releasePrebuiltSha}"
                    )
                }
                verifyGtolibReleasePair()
                logger.lifecycle(
                        "GTOLib release(单轨): 已同步 libs/gtolib-release.jar + .PROTECTED " +
                                "(${gtolibReleaseLibsJar.length()} bytes)"
                )
            } else if (canProguardRelease) {
                logger.warn("GTOLib release: 无 Seal Packager，发行单轨未生成（发行 jar 将无法构建）")
            } else {
                logger.warn(
                        "GTOLib release: 缺 GTOLib/protect/proguard-release-rules.pro，" +
                                "发行单轨未生成（发行 jar 将无法构建）"
                )
            }
        }
        def mode = (sealed.exists() && sealed.length() > 0) ? 'ProGuard+Seal' : (pg.exists() ? 'ProGuard' : 'prebuilt')
        logger.lifecycle("GTOLib protected (${mode}): ${protectedFile} (${protectedFile.length()} bytes)")
    }
}

/**
 * 保证 gtolib.mixins.json 明文在 jar / main resources 中。
 */
ext.injectGtolibMixinConfig = { File jarFile ->
    def mixinSrc = file('GTOLib/src/main/resources/gtolib.mixins.json')
    if (!mixinSrc.exists()) {
        def tmpDir = file("${buildDir}/gtolib/mixin-extract")
        tmpDir.mkdirs()
        def extracted = new File(tmpDir, 'gtolib.mixins.json')
        for (def jarCand : [gtolibUnprotectedJar.get().asFile, gtolibRawJar.get().asFile, gtolibProtectedLibsJar]) {
            if (jarCand == null || !jarCand.exists()) continue
            try {
                ant.unzip(src: jarCand, dest: tmpDir) {
                    patternset { include(name: 'gtolib.mixins.json') }
                }
                if (extracted.exists() && extracted.length() > 2 && extracted.getText('UTF-8').trim().startsWith('{')) {
                    mixinSrc = extracted
                    break
                }
            } catch (Throwable ignored) {
            }
        }
    }
    if (!mixinSrc.exists() || mixinSrc.length() < 2) {
        logger.warn("GTOLib: 找不到明文 gtolib.mixins.json")
        return
    }
    def resOut = file("${buildDir}/resources/main")
    resOut.mkdirs()
    Files.copy(mixinSrc.toPath(), new File(resOut, 'gtolib.mixins.json').toPath(), StandardCopyOption.REPLACE_EXISTING)

    if (jarFile != null && jarFile.exists() && jarFile.length() > 0) {
        def tmp = new File(jarFile.absolutePath + '.mixinfix')
        def zis = new java.util.zip.ZipInputStream(new FileInputStream(jarFile))
        def zos = new java.util.zip.ZipOutputStream(new FileOutputStream(tmp))
        java.util.zip.ZipEntry e
        while ((e = zis.nextEntry) != null) {
            if (e.name == 'gtolib.mixins.json') {
                zis.closeEntry()
                continue
            }
            def outEntry = new java.util.zip.ZipEntry(e.name)
            zos.putNextEntry(outEntry)
            zis.transferTo(zos)
            zos.closeEntry()
            zis.closeEntry()
        }
        zos.putNextEntry(new java.util.zip.ZipEntry('gtolib.mixins.json'))
        mixinSrc.withInputStream { is -> is.transferTo(zos) }
        zos.closeEntry()
        zos.close()
        zis.close()
        Files.move(tmp.toPath(), jarFile.toPath(), StandardCopyOption.REPLACE_EXISTING)
    }
}

/**
 * 解析「当前最好的」gtolib.refmap.json：
 * 选 mappings 更多 / 体积更大的（CI 无 GTOLib 时 AP 产物往往残缺，不能盖过预置完整版）。
 */
ext.resolveGtolibRefmapFile = {
    def candidates = [
            file("${buildDir}/mixin/gtolib.refmap.json"),
            file('src/main/resources/gtolib.refmap.json'),
            file("${buildDir}/resources/main/gtolib.refmap.json"),
    ].findAll { it.exists() && it.length() > 64 }
    if (candidates.isEmpty()) return null
    def score = { File f ->
        try {
            def root = new groovy.json.JsonSlurper().parse(f)
            def n = (root instanceof Map && root.mappings instanceof Map) ? root.mappings.size() : 0
            return n * 1_000_000L + f.length()
        } catch (Throwable t) {
            return f.length()
        }
    }
    return candidates.max { score(it) }
}

/**
 * ResourceLocationMixn 与官方 GTOLib 26.7.5 一致：@Shadow namespace/path + @Overwrite。
 * 生产 jar 必须经 reobf 把成员改成 f_/m_（见 maven gtolib-forge 已 reobf 的 class）。
 * CI 无 GTOLib 源码时没有 Mixin AP → 没有 .mappings.tsrg → reobf 不改名 → Overwrite 失败。
 * 因此 JSON refmap + tsrg 都必须预置/补全，且 mappings 使用 owner;name+desc 全量格式。
 */
ext.resourceLocationMixnRefmapNamed = {
    [
            'namespace'           : 'Lnet/minecraft/resources/ResourceLocation;f_135804_:Ljava/lang/String;',
            'path'                : 'Lnet/minecraft/resources/ResourceLocation;f_135805_:Ljava/lang/String;',
            'toString'            : 'Lnet/minecraft/resources/ResourceLocation;toString()Ljava/lang/String;',
            'assertValidNamespace': 'Lnet/minecraft/resources/ResourceLocation;m_245413_(Ljava/lang/String;Ljava/lang/String;)Ljava/lang/String;',
            'assertValidPath'     : 'Lnet/minecraft/resources/ResourceLocation;m_245185_(Ljava/lang/String;Ljava/lang/String;)Ljava/lang/String;',
            'withPath'            : 'Lnet/minecraft/resources/ResourceLocation;m_247449_(Ljava/lang/String;)Lnet/minecraft/resources/ResourceLocation;',
    ]
}
ext.resourceLocationMixnTsrgLines = {
    // 字段：与 Mixin AP 一致「类 字段名 srg名」（不要带类型描述符，否则 ART 不改名）
    // 方法：类 方法名 描述符 srg名
    [
            'com/gtolib/mixin/mc/ResourceLocationMixn namespace f_135804_',
            'com/gtolib/mixin/mc/ResourceLocationMixn path f_135805_',
            'com/gtolib/mixin/mc/ResourceLocationMixn toString ()Ljava/lang/String; toString',
            'com/gtolib/mixin/mc/ResourceLocationMixn assertValidNamespace (Ljava/lang/String;Ljava/lang/String;)Ljava/lang/String; m_245413_',
            'com/gtolib/mixin/mc/ResourceLocationMixn assertValidPath (Ljava/lang/String;Ljava/lang/String;)Ljava/lang/String; m_245185_',
            'com/gtolib/mixin/mc/ResourceLocationMixn withPath (Ljava/lang/String;)Lnet/minecraft/resources/ResourceLocation; m_247449_',
    ]
}

ext.patchCriticalGtolibRefmapEntries = { File refmapFile ->
    if (refmapFile == null || !refmapFile.exists()) return
    def slurper = new groovy.json.JsonSlurper()
    def root = slurper.parse(refmapFile)
    if (!(root instanceof Map)) return
    def mappings = root.mappings
    def searge = root.data?.searge
    if (!(mappings instanceof Map)) {
        root.mappings = [:]
        mappings = root.mappings
    }
    if (!(searge instanceof Map)) {
        if (root.data == null) root.data = [:]
        root.data.searge = [:]
        searge = root.data.searge
    }
    def key = 'com/gtolib/mixin/mc/ResourceLocationMixn'
    def named = resourceLocationMixnRefmapNamed()
    def cur = mappings[key]
    def need = !(cur instanceof Map) ||
            !cur.containsKey('namespace') ||
            !cur.containsKey('assertValidNamespace') ||
            cur.containsKey('getNamespace') ||
            !(cur.get('namespace')?.toString()?.contains('f_135804_')) ||
            !(cur.get('assertValidNamespace')?.toString()?.startsWith('L'))
    if (need) {
        mappings[key] = named
        searge[key] = named
        refmapFile.text = groovy.json.JsonOutput.toJson(root)
        logger.lifecycle("GTOLib refmap: 已写入 ${key} 字段+Overwrite 全量映射（对齐官方 gtolib）")
    }
}

/** 保证 ART/reobfJar 使用的 tsrg 含 ResourceLocationMixn（CI 无源码时尤其关键） */
ext.ensureResourceLocationMixnTsrg = { File tsrgFile ->
    if (tsrgFile == null) return
    tsrgFile.parentFile?.mkdirs()
    def lines = tsrgFile.exists() ? tsrgFile.readLines() : []
    def body = lines.findAll { !it.contains('com/gtolib/mixin/mc/ResourceLocationMixn') }
    // 保留文件头（若有 tsrg2）
    def header = body.takeWhile { it.startsWith('tsrg') || it.trim().isEmpty() }
    def rest = body.drop(header.size())
    def out = []
    out.addAll(header)
    out.addAll(resourceLocationMixnTsrgLines())
    out.addAll(rest)
    tsrgFile.text = out.join('\n') + '\n'
}

/**
 * 有源码重建 gtolib 时：把完整 refmap 写入
 *  - build/mixin（reobf）
 *  - build/resources/main + src/main/resources（无权限消费 / 下次 CI）
 *  - 指定 jar 根目录（raw/protected）
 * 无源码：只消费预置，不改 src/main/resources。
 */
ext.publishAndInjectGtolibRefmaps = { File jarFile, boolean writeToRepoResources ->
    def src = resolveGtolibRefmapFile()
    if (src == null) {
        logger.warn("GTOLib refmap: 未找到有效 gtolib.refmap.json（AP 与 resources 均无）")
        return false
    }
    patchCriticalGtolibRefmapEntries(src)
    def mixinDir = file("${buildDir}/mixin")
    mixinDir.mkdirs()
    def mixinGtolib = new File(mixinDir, 'gtolib.refmap.json')
    def mixinGtocore = new File(mixinDir, 'gtocore.refmap.json')
    if (src.absolutePath != mixinGtolib.absolutePath) {
        Files.copy(src.toPath(), mixinGtolib.toPath(), StandardCopyOption.REPLACE_EXISTING)
    }
    // gtocore.mixins.json 声明 refmap=gtocore.refmap.json：与完整映射同步
    Files.copy(mixinGtolib.toPath(), mixinGtocore.toPath(), StandardCopyOption.REPLACE_EXISTING)

    def resOut = file("${buildDir}/resources/main")
    resOut.mkdirs()
    Files.copy(mixinGtolib.toPath(), new File(resOut, 'gtolib.refmap.json').toPath(), StandardCopyOption.REPLACE_EXISTING)
    Files.copy(mixinGtocore.toPath(), new File(resOut, 'gtocore.refmap.json').toPath(), StandardCopyOption.REPLACE_EXISTING)

    if (writeToRepoResources) {
        def repoGtolib = file('src/main/resources/gtolib.refmap.json')
        def repoGtocore = file('src/main/resources/gtocore.refmap.json')
        repoGtolib.parentFile.mkdirs()
        Files.copy(mixinGtolib.toPath(), repoGtolib.toPath(), StandardCopyOption.REPLACE_EXISTING)
        Files.copy(mixinGtocore.toPath(), repoGtocore.toPath(), StandardCopyOption.REPLACE_EXISTING)
        logger.lifecycle("GTOLib refmap: 已写入 src/main/resources（有源码打包；无权限开发者/CI 消费） ${mixinGtolib.length()} bytes")
    }

    if (jarFile != null && jarFile.exists() && jarFile.length() > 0) {
        def tmp = new File(jarFile.absolutePath + '.refmapfix')
        def zis = new java.util.zip.ZipInputStream(new FileInputStream(jarFile))
        def zos = new java.util.zip.ZipOutputStream(new FileOutputStream(tmp))
        java.util.zip.ZipEntry e
        def skip = ['gtolib.refmap.json', 'gtocore.refmap.json'] as Set
        while ((e = zis.nextEntry) != null) {
            if (skip.contains(e.name)) {
                zis.closeEntry()
                continue
            }
            def outEntry = new java.util.zip.ZipEntry(e.name)
            zos.putNextEntry(outEntry)
            zis.transferTo(zos)
            zos.closeEntry()
            zis.closeEntry()
        }
        zos.putNextEntry(new java.util.zip.ZipEntry('gtolib.refmap.json'))
        mixinGtolib.withInputStream { is -> is.transferTo(zos) }
        zos.closeEntry()
        zos.putNextEntry(new java.util.zip.ZipEntry('gtocore.refmap.json'))
        mixinGtocore.withInputStream { is -> is.transferTo(zos) }
        zos.closeEntry()
        zos.close()
        zis.close()
        Files.move(tmp.toPath(), jarFile.toPath(), StandardCopyOption.REPLACE_EXISTING)
        logger.lifecycle("GTOLib refmap: 已注入 ${jarFile.name}")
    }
    return true
}

tasks.register('syncGtolibRefmaps') {
    group = 'gtolib'
    description = '同步 Mixin refmap：有源码时从 AP 写入 resources；始终保证 build 资源与 jar 可消费'
    // classes 会跑 Mixin AP；无源码时仅回填预置
    dependsOn {
        hasGtolibSources ? ['classes'] : []
    }
    outputs.upToDateWhen { false }
    doLast {
        def ok = publishAndInjectGtolibRefmaps(null, hasGtolibSources)
        if (!ok && !hasGtolibSources) {
            def res = file('src/main/resources/gtolib.refmap.json')
            if (!res.exists() || res.length() < 64) {
                throw new GradleException(
                        "无 GTOLib 源码时必须有预置 src/main/resources/gtolib.refmap.json（由有权限打包时写入）。"
                )
            }
        }
        def gtolibRm = file("${buildDir}/mixin/gtolib.refmap.json")
        if (!gtolibRm.exists()) {
            gtolibRm = file('src/main/resources/gtolib.refmap.json')
        }
        if (gtolibRm.exists() && gtolibRm.length() > 64) {
            // 快速检查：ResourceLocationMixn 必须在 mappings 里（生产 Shadow 必需）
            def text = gtolibRm.getText('UTF-8')
            if (!text.contains('ResourceLocationMixn')) {
                logger.warn("GTOLib refmap: 缺少 ResourceLocationMixn 映射（生产可能 Shadow 失败）— 请有权限时 -PgtolibRebuild=true 全量重编")
            }
        }
    }
}

tasks.register('finalizeGtolib') {
    group = 'gtolib'
    description = '两档：调试=未加密 unprotected；默认=加密 protected'
    dependsOn 'buildGtolibProtected'
    // Runtime：有 GTOSeal 则从 jni 同步；无则只校验 Main/libs（改 gtolib 不需要 Seal 权限）
    if (hasGtosealSources) {
        dependsOn 'packSealRuntimeJar', 'syncSealRuntimeToLibs'
    } else if (tasks.findByName('syncSealRuntimeToLibs') != null) {
        dependsOn 'syncSealRuntimeToLibs'
    }
    inputs.property('gtolibDebugMode', { detectGtolibDebugMode() })
    inputs.property('gtolibFingerprint', { gtolibFingerprint })
    inputs.files(
            gtolibProtectedJar,
            gtolibUnprotectedJar,
            gtolibRawJar,
            gtolibProtectedLibsJar
    ).withPropertyName('candidateReadyJars').optional()
    outputs.file(gtolibReadyJar)
    outputs.upToDateWhen { false }

    doLast {
        def hasSrc = hasGtolibSources
        def debug = hasSrc && detectGtolibDebugMode()
        def ready = gtolibReadyJar.get().asFile
        def unprotected = gtolibUnprotectedJar.get().asFile
        def protectedFile = gtolibProtectedJar.get().asFile
        ready.parentFile.mkdirs()

        def chosen
        def kind
        if (!hasSrc) {
            chosen = protectedFile.exists() && protectedFile.length() > 0 ? protectedFile : gtolibProtectedLibsJar
            kind = '加密(prebuilt Seal)'
        } else if (debug) {
            chosen = unprotected.exists() && unprotected.length() > 0 ? unprotected : gtolibRawJar.get().asFile
            kind = '未加密(unprotected)'
        } else {
            // 加密：ProGuard + Seal（与 libs / 发行同一套）
            chosen = protectedFile.exists() && protectedFile.length() > 0 ? protectedFile : unprotected
            kind = '加密(ProGuard+Seal)'
        }
        if (chosen == null || !chosen.exists() || chosen.length() == 0) {
            throw new GradleException("没有可用的 gtolib 包")
        }
        Files.copy(chosen.toPath(), ready.toPath(), StandardCopyOption.REPLACE_EXISTING)
        injectGtolibMixinConfig(ready)
        logger.lifecycle(
                "GTOLib ready ← ${kind} (${chosen.name}) → gtolib-ready.jar | " +
                        "${ready.length()} bytes | debug=${debug}"
        )
    }
}

/**
 * 把 ready 打成「独立 gtolib 模组 jar」（含 mods.toml + 原 Manifest Salt）。
 * Seal Runtime 按 modId=gtolib 的 SecureJar 定位加密体与 bins——与玩家发行布局一致。
 */
ext.gtolibModJar = layout.buildDirectory.file('gtolib/gtolib-mod.jar')

/**
 * Seal 抽空会丢掉注解属性，FML 扫描不到 @Mod。
 * 预编译明文 stub：gradle/scripts/gtolib-mod-stub/GTOLibMod.class
 * 源码在同目录 src/（需要时用 javafmllanguage 的 @Mod 重编）。
 */
ext.gtolibModStubClass = file('gradle/scripts/gtolib-mod-stub/GTOLibMod.class')

tasks.register('prepareGtolibModJar') {
    group = 'gtolib'
    description = '准备独立 gtolib 模组 jar（Seal 加密体 + mods.toml + 明文 @Mod stub）'
    dependsOn 'finalizeGtolib'
    inputs.file(gtolibReadyJar).withPropertyName('readyJar')
    inputs.files(gtolibUnprotectedJar, gtolibUnprotectedLibsJar)
            .withPropertyName('namedMixinOverlayJars').optional()
    inputs.file(gtolibModStubClass).withPropertyName('gtolibModStub')
    inputs.property('gtolibModVersion', project.version.toString())
    outputs.file(gtolibModJar)
    doLast {
        def ready = gtolibReadyJar.get().asFile
        def out = gtolibModJar.get().asFile
        if (!ready.exists() || ready.length() == 0) {
            throw new GradleException("gtolib-ready.jar 无效")
        }
        out.parentFile.mkdirs()
        def stubClass = gtolibModStubClass
        if (!stubClass.exists() || stubClass.length() < 50) {
            throw new GradleException("缺少明文 GTOLibMod stub: ${stubClass}")
        }
        // 本 jar 只进 run/*/mods 供 userdev（发行 jar 直接取 protected jar，不经过本任务）。
        // Mixin 处理器直接读 jar 里的明文 mixin 类（不走 .dev.bin 解密），而加密档的
        // mixin 类经 ART reobf 已是 SRG（m_xxx_），userdev 的 Minecraft 是官方名，
        // @Shadow 会 "was not located in the target class"（m_91294_ 事故）。
        // 所以用 named 的 unprotected mixin 类覆盖明文 mixin；其余类 dev 运行时
        // 由 Seal 从 .dev.bin（named）定义，两侧命名一致。
        def mixinOverlay = [:]
        def overlaySrc = gtolibUnprotectedJar.get().asFile
        if (!overlaySrc.exists() || overlaySrc.length() == 0) {
            overlaySrc = gtolibUnprotectedLibsJar
        }
        if (overlaySrc.exists() && overlaySrc.length() > 0) {
            new java.util.zip.ZipFile(overlaySrc).withCloseable { uzf ->
                uzf.entries().each { ue ->
                    if (ue.name.startsWith('com/gtolib/mixin/') && ue.name.endsWith('.class')) {
                        mixinOverlay[ue.name] = uzf.getInputStream(ue).bytes
                    }
                }
            }
        } else {
            logger.warn("GTOLib mod jar: 无 named unprotected jar，mixin 类保持原样（userdev 下 @Shadow 可能失败）")
        }
        // 复制 ready，注入 mods.toml + pack.mcmeta + 明文 @Mod（不覆盖 Seal Manifest）
        def zis = new java.util.zip.ZipInputStream(new FileInputStream(ready))
        def zos = new java.util.zip.ZipOutputStream(new FileOutputStream(out))
        java.util.zip.ZipEntry e
        def overlaid = 0
        while ((e = zis.nextEntry) != null) {
            // 统一由下方写入
            if (e.name.equalsIgnoreCase('META-INF/mods.toml') ||
                    e.name.equalsIgnoreCase('pack.mcmeta') ||
                    e.name == 'com/gtolib/GTOLibMod.class') {
                zis.closeEntry()
                continue
            }
            def named = mixinOverlay.remove(e.name)
            zos.putNextEntry(new java.util.zip.ZipEntry(e.name))
            if (named != null) {
                zos.write((byte[]) named)
                overlaid++
            } else {
                zis.transferTo(zos)
            }
            zos.closeEntry()
            zis.closeEntry()
        }
        if (overlaid > 0) {
            logger.lifecycle("GTOLib mod jar: ${overlaid} 个 mixin 类已换成 named（userdev @Shadow 兼容）")
        }
        def toml = """\
modLoader="javafml"
loaderVersion="[47,)"
license="All Rights Reserved"

[[mods]]
modId="gtolib"
version="${project.version}"
displayName="GTOLib"
description='''Seal-protected GTO library (embedded companion of gtocore).'''
""".stripIndent()
        zos.putNextEntry(new java.util.zip.ZipEntry('META-INF/mods.toml'))
        zos.write(toml.getBytes('UTF-8'))
        zos.closeEntry()
        // 1.20.1 客户端为每个 mod 建 ResourcePackInfo，缺 pack.mcmeta 会报
        // "failed to load a valid ResourcePackInfo" / Missing metadata in pack mod:gtolib
        def packMeta = '''\
{
  "pack": {
    "description": "gtolib (Seal-protected companion)",
    "pack_format": 15
  }
}
'''.stripIndent()
        zos.putNextEntry(new java.util.zip.ZipEntry('pack.mcmeta'))
        zos.write(packMeta.getBytes('UTF-8'))
        zos.closeEntry()
        zos.putNextEntry(new java.util.zip.ZipEntry('com/gtolib/GTOLibMod.class'))
        stubClass.withInputStream { it.transferTo(zos) }
        zos.closeEntry()
        zos.close()
        zis.close()
        logger.lifecycle("GTOLib mod jar → ${out} (${out.length()} bytes) + GTOLibMod + pack.mcmeta")
    }
}

/**
 * 安装策略（玩家 / 无权限 / 有权限加密 同一模型）：
 * - 加密档：gtolib 作为独立模组 jar 放进 run/mods；主工程不塞 hollow class
 * - 调试档：明文解压进 main classes（可断点）
 */
tasks.register('installGtolibIntoModOutput') {
    group = 'gtolib'
    description = '加密→run/mods 独立 gtolib；调试→解压明文进 main'
    dependsOn 'finalizeGtolib', 'prepareGtolibModJar', 'classes', 'processResources'
    doLast {
        def ready = gtolibReadyJar.get().asFile
        def modJar = gtolibModJar.get().asFile
        def hasSrc = hasGtolibSources
        def debug = hasSrc && detectGtolibDebugMode()
        def classOut = file("${buildDir}/classes/java/main")
        def kotlinOut = file("${buildDir}/classes/kotlin/main")
        def resOut = file("${buildDir}/resources/main")

        // 总是先清掉 main 里的 gtolib / native0 加密资源，避免污染
        [file("${classOut}/com/gtolib"), file("${kotlinOut}/com/gtolib")].each { d ->
            if (d.exists()) project.delete(d)
        }
        def n0 = new File(resOut, 'native0')
        if (n0.exists()) project.delete(n0)
        def oldMixin = new File(resOut, 'gtolib.mixins.json')
        if (oldMixin.exists()) oldMixin.delete()

        // 清理 run/mods 里旧 gtolib / 旧 seal
        ['client', 'data', 'server'].each { runName ->
            def modsDir = file("run/${runName}/mods")
            if (modsDir.exists()) {
                modsDir.listFiles()?.findAll {
                    def n = it.name
                    (n.startsWith('gtolib') || n.startsWith('gto-seal-runtime') || n.startsWith('gtonativelib')) &&
                            n.endsWith('.jar')
                }?.each { it.delete() }
            }
        }

        // Seal Runtime 必须作为独立 jar 放进 run/*/mods（ITransformationService），
        // 不可打进 gtocore（否则 Forge 会把 gtocore 整包排除出 mod 发现）。
        def installSealToRunMods = {
            if (!sealRuntimeLibsJar.exists() || sealRuntimeLibsJar.length() < 100_000) {
                throw new GradleException("需要完整 Seal Runtime: ${sealRuntimeLibsJar}")
            }
            ['client', 'data', 'server'].each { runName ->
                def modsDir = file("run/${runName}/mods")
                modsDir.mkdirs()
                def dest = new File(modsDir, 'gto-seal-runtime-1.0.jar')
                Files.copy(sealRuntimeLibsJar.toPath(), dest.toPath(), StandardCopyOption.REPLACE_EXISTING)
                logger.lifecycle("GTO Seal: 【独立】${dest}")
            }
        }

        if (debug) {
            // 调试：明文进 main
            project.copy {
                from project.zipTree(ready)
                into classOut
                include '**/*.class'
                include 'META-INF/*.kotlin_module'
                duplicatesStrategy = DuplicatesStrategy.INCLUDE
            }
            project.copy {
                from project.zipTree(ready)
                into resOut
                exclude '**/*.class'
                exclude 'META-INF/MANIFEST.MF'
                duplicatesStrategy = DuplicatesStrategy.INCLUDE
            }
            injectGtolibMixinConfig(null)
            // 调试模式仍放 seal，保持与生产一致的服务发现路径
            installSealToRunMods()
            logger.lifecycle("GTOLib: 【未加密】已解压明文 → main classes")
            return
        }

        // 加密：独立模组 jar → 各 run/mods（与玩家「gtolib 是独立 SecureJar」一致）
        if (!modJar.exists() || modJar.length() == 0) {
            throw new GradleException("gtolib-mod.jar 无效")
        }
        ['client', 'data', 'server'].each { runName ->
            def modsDir = file("run/${runName}/mods")
            modsDir.mkdirs()
            def dest = new File(modsDir, 'gtolib-protected.jar')
            Files.copy(modJar.toPath(), dest.toPath(), StandardCopyOption.REPLACE_EXISTING)
            logger.lifecycle("GTOLib: 【加密】${dest}")
        }
        // 主工程只保留明文 mixin 配置名列表（FML 仍声明 gtolib.mixins，实际由 gtolib 模组提供）
        injectGtolibMixinConfig(null)
        // 同步完整 Runtime 到 libs（classpath）
        if (tasks.findByName('syncSealRuntimeToLibs') != null) {
            // already depended via finalize when sources present
        }
        installSealToRunMods()
        logger.lifecycle("GTOLib: 【加密】独立 gtolib 模组 + 独立 Seal Runtime (${sealRuntimeLibsJar.length()} bytes)")
    }
}

// 兼容旧任务名
tasks.register('stripGtolibFromMainClasses') {
    group = 'gtolib'
    dependsOn 'installGtolibIntoModOutput'
}

// 是否为「会拉起 MC / ModLauncher」的任务。
// IDEA 直接 Run Main 时不会走 runData，而是注入 net.neoforged.devlaunch.Main.main()。
// 若不挂 installGtolib：main 明文 com.gtolib + run/<client|data|server>/mods/gtolib-protected.jar
// → JPMS: Modules gtocore and gtolib export package com.gtolib...
ext.isGtolibLaunchTask = { Task t ->
    def n = t.name
    if (n in ['runClient', 'runServer', 'runData', 'runGameTestServer']) return true
    // IDEA / NeoForged DevLaunch 注入
    if (n.contains('devlaunch') || n.contains('DevLaunch')) return true
    if (n.contains('Main.main') || n.endsWith('.main()') || n.contains('.main_')) return true
    // IDEA External Projects 的 before-compile 会调用 prepareClientRun 等任务。
    if (n.startsWith('prepare') && n.endsWith('Run')) return true
    if (n.startsWith('run') && n.toLowerCase().contains('forge')) return true
    return false
}

// 尽早挂 whenTaskAdded（init script 可能在 afterEvaluate 前注册 DevLaunch 任务）
ext.__gtolibLaunchWired = new HashSet<String>()
ext.wireGtolibInstallTo = { Task t ->
    if (!isGtolibLaunchTask(t)) return
    if (!__gtolibLaunchWired.add(t.path)) return
    // install 任务可能尚未 register：用路径字符串依赖
    t.dependsOn 'installGtolibIntoModOutput'
    t.doFirst {
        def hasSrc = hasGtolibSources
        def debug = hasSrc && detectGtolibDebugMode()
        logger.lifecycle(
                "GTOLib run [${t.name}]: hasSources=${hasSrc} upToDate=${isGtolibJarUpToDate} " +
                        "debug=${debug} → ${(!hasSrc || !debug) ? '加密(protected)' : '未加密(unprotected)'}"
        )
    }
}
tasks.whenTaskAdded { Task t -> wireGtolibInstallTo(t) }

afterEvaluate {
    tasks.matching { isGtolibLaunchTask(it) }.configureEach { Task t -> wireGtolibInstallTo(t) }

    tasks.named('jar', Jar).configure {
        // ensureMixinRefmapMappings 只挂 reobfJar（必须在 jar 之后补 tsrg，避免循环依赖）
        dependsOn 'installGtolibIntoModOutput', 'buildGtolibProtected', 'prepareGtolibModJar', 'syncGtolibRefmaps'
        if (tasks.findByName('syncSealRuntimeToLibs') != null) {
            dependsOn 'syncSealRuntimeToLibs'
        }
        duplicatesStrategy = DuplicatesStrategy.EXCLUDE
        // 注意：不要在 jar 任务顶层 exclude 'com/gtolib/**' —— Gradle 的 exclude 作用于
        // 所有 from()，会把 Seal 加密包里的 hollow class 一并丢掉，玩家包只剩 .bin。
        // 加密模式下 installGtolibIntoModOutput 已清掉 main 里的明文 com.gtolib。
        // 玩家包统一用 writeDualModsToml 的双 modId，禁止 resources 再塞一份
        exclude 'META-INF/mods.toml'
        // 加密 gtolib（hollow class + bins + Manifest Salt + mixins）
        // 路线 A：默认嵌入发行单轨 gtolib-release（类名混淆、无 dev.bin）；
        // 仅调试明文模式沿用本地 protected/ready。选择逻辑与 Salt 读取共用同一 resolver。
        from({
            def f = resolveGtolibReleaseEmbedJar()
            (f != null && f.exists() && f.length() > 0) ? zipTree(f) : []
        }) {
            exclude 'META-INF/mods.toml' // 用下方双 modId 清单
            exclude 'com/gtolib/GTOLibMod.class' // 明文 stub 见下
            duplicatesStrategy = DuplicatesStrategy.EXCLUDE
        }
        // 明文 @Mod("gtolib")：Seal 抽空会丢注解，发行包必须带未加密入口
        from({
            def modJar = gtolibModJar.get().asFile
            modJar.exists() ? zipTree(modJar) : []
        }) {
            include 'com/gtolib/GTOLibMod.class'
            duplicatesStrategy = DuplicatesStrategy.INCLUDE
        }
        // 禁止把 Seal Runtime 打进 gtocore（ITransformationService 会导致整包被 Forge 排除）
        dependsOn 'writeDualModsToml'
        from(layout.buildDirectory.file('gtolib/mods-dual.toml')) {
            into 'META-INF'
            rename { 'mods.toml' }
            duplicatesStrategy = DuplicatesStrategy.INCLUDE
        }
        doFirst {
            if (!sealRuntimeLibsJar.exists() || sealRuntimeLibsJar.length() < 100_000) {
                throw new GradleException(
                        "发行需要完整 GTO Seal Runtime（独立 jar，勿内嵌）: ${sealRuntimeLibsJar}\n" +
                                "请保证 libs/gto-seal-runtime-1.0.jar 存在（或 ./gradlew syncSealRuntimeToLibs）"
                )
            }
            // 路线 A：发行包体必须是单轨 release；缺失时硬失败，不许悄悄退回双轨 protected
            def embed = resolveGtolibReleaseEmbedJar()
            if (embed == null) {
                throw new GradleException(
                        "发行 jar 需要单轨 gtolib-release（类名混淆、无 dev.bin）。\n" +
                                "请有权限者: ./gradlew -PgtolibRebuild=true buildGtolibProtected\n" +
                                "并提交 libs/gtolib-release.jar + libs/gtolib-release.PROTECTED。"
                )
            }
            if (embed.canonicalPath == gtolibReleaseLibsJar.canonicalPath) {
                verifyGtolibReleasePair()
            }
            logger.lifecycle("GTO jar: 嵌入 gtolib 包体 ← ${embed.name}")
            // 写入 resources / mixin（不在 from 里叠多份，避免 reobf Duplicate entries）
            publishAndInjectGtolibRefmaps(null, hasGtolibSources)
        }
        doLast {
            // 打入最终 jar 根目录唯一一份 refmap（含关键 Shadow 补丁）
            def outJar = archiveFile.get().asFile
            if (!publishAndInjectGtolibRefmaps(outJar, false)) {
                throw new GradleException("无法将 gtolib.refmap.json 注入发行 jar")
            }
            def text = new java.util.zip.ZipFile(outJar).withCloseable { zf ->
                def e = zf.getEntry('gtolib.refmap.json')
                if (e == null) return ''
                zf.getInputStream(e).getText('UTF-8')
            }
            if (!text.contains('ResourceLocationMixn')) {
                throw new GradleException(
                        "发行 jar 内 gtolib.refmap.json 仍缺 ResourceLocationMixn"
                )
            }
            logger.lifecycle("GTO jar: Seal 独立; refmap 已注入且含 ResourceLocationMixn")
        }
    }

    // 将 Seal Runtime 复制到 build/libs，供 CI / 本地与 gtocore 一并分发
    tasks.register('stageSealRuntimeArtifact', Copy) {
        group = 'gtolib'
        description = '复制 gto-seal-runtime 到 build/libs（与 gtocore 并列产物）'
        if (tasks.findByName('syncSealRuntimeToLibs') != null) {
            dependsOn 'syncSealRuntimeToLibs'
        }
        from(sealRuntimeLibsJar)
        into(layout.buildDirectory.dir('libs'))
        rename { 'gto-seal-runtime-1.0.jar' }
        onlyIf { sealRuntimeLibsJar.exists() && sealRuntimeLibsJar.length() >= 100_000 }
        doFirst {
            if (!sealRuntimeLibsJar.exists() || sealRuntimeLibsJar.length() < 100_000) {
                throw new GradleException("stageSealRuntimeArtifact: 缺少 ${sealRuntimeLibsJar}")
            }
            logger.lifecycle("GTO Seal: stage → build/libs/gto-seal-runtime-1.0.jar")
        }
    }
    tasks.named('jar').configure { finalizedBy 'stageSealRuntimeArtifact' }
    tasks.matching { it.name == 'build' }.configureEach { dependsOn 'stageSealRuntimeArtifact' }

    tasks.register('writeDualModsToml') {
        group = 'gtolib'
        description = '写出玩家包双 modId mods.toml（gtocore + gtolib，保留完整依赖）'
        dependsOn 'processResources'
        def out = layout.buildDirectory.file('gtolib/mods-dual.toml')
        // 优先用 processResources 展开后的 mods.toml（含 deeperdarker AFTER 等）
        def expanded = file("${buildDir}/resources/main/META-INF/mods.toml")
        def template = file('src/main/templates/META-INF/mods.toml')
        inputs.files(expanded, template).optional()
        outputs.file(out)
        doLast {
            def baseText = null
            if (expanded.exists() && expanded.length() > 0) {
                baseText = expanded.getText('UTF-8')
            } else if (template.exists()) {
                // 简易占位展开（CI/无 processResources 时）
                baseText = template.getText('UTF-8')
                        .replace('${mod_license}', "${project.findProperty('mod_license') ?: 'All Rights Reserved'}")
                        .replace('${mod_id}', "${project.mod_id}")
                        .replace('${version}', "${project.version}")
                        .replace('${mod_name}', "${project.findProperty('mod_name') ?: project.name}")
                        .replace('${mod_description}', "${project.findProperty('mod_description') ?: ''}")
            }
            if (baseText == null || baseText.trim().isEmpty()) {
                throw new GradleException("writeDualModsToml: 找不到 mods.toml 模板/展开结果")
            }
            // 已有 gtolib 段则不重复
            if (!baseText.contains('modId="gtolib"') && !baseText.contains("modId = \"gtolib\"")) {
                def gtolibMod = """

[[mods]]
modId="gtolib"
version="${project.version}"
displayName="GTOLib"
description='''Seal-protected GTO library (bundled).'''
"""
                // 插在第一个 [[dependencies 之前，否则依赖块在 mods 前不合法
                def depIdx = baseText.indexOf('[[dependencies')
                if (depIdx >= 0) {
                    baseText = baseText.substring(0, depIdx) + gtolibMod + baseText.substring(depIdx)
                } else {
                    baseText = baseText + gtolibMod
                }
            }
            // 强制 datasynclib 依赖（jarJar 提供）
            if (!baseText.contains('datasynclib')) {
                baseText += """

[[dependencies.${project.mod_id}]]
modId="datasynclib"
mandatory=true
versionRange="[1,)"
ordering="NONE"
side="BOTH"
"""
            }
            def f = out.get().asFile
            f.parentFile.mkdirs()
            f.text = baseText
            // 必须含 deeperdarker AFTER，否则 sculk_stone 注册时 DD 未就绪
            if (!baseText.contains('deeperdarker')) {
                logger.warn("writeDualModsToml: 模板缺少 deeperdarker 依赖，注册可能 NPE")
            } else {
                logger.lifecycle("writeDualModsToml: 双 modId + 完整依赖（含 deeperdarker）")
            }
        }
    }
    // Mixin AP 写出 gtolib.refmap*.tsrg；reobfJar/ART 靠它把 mixin 成员改成 f_/m_。
    // CI submodules:false 无 GTOLib 源码 → 无 AP → 必须从 resources 预置 tsrg，否则
    // Overwrite assertValidNamespace 等仍为 Mojmap 名，生产 “was not located”。
    tasks.register('ensureMixinRefmapMappings') {
        group = 'gtolib'
        // 必须在 jar（Mixin AP 已写 tsrg）之后、reobfJar 之前执行；不可 dependsOn jar（jar 会间接依赖本任务链）
        mustRunAfter 'classes', 'jar'
        def mixinDir = file("${buildDir}/mixin")
        def gtocoreMap = new File(mixinDir, 'gtocore.refmap.json.mappings.tsrg')
        def gtolibMap = new File(mixinDir, 'gtolib.refmap.json.mappings.tsrg')
        def repoGtolibTsrg = file('src/main/resources/gtolib.refmap.json.mappings.tsrg')
        def repoGtocoreTsrg = file('src/main/resources/gtocore.refmap.json.mappings.tsrg')
        outputs.files(gtocoreMap, gtolibMap)
        doLast {
            mixinDir.mkdirs()
            // 1) 预置/恢复 tsrg（AP 优先已在 build/mixin；否则 resources）
            if ((!gtolibMap.exists() || gtolibMap.length() < 32) && repoGtolibTsrg.exists()) {
                Files.copy(repoGtolibTsrg.toPath(), gtolibMap.toPath(), StandardCopyOption.REPLACE_EXISTING)
                logger.lifecycle("Mixin: gtolib tsrg ← src/main/resources（CI 无源码路径）")
            }
            if ((!gtocoreMap.exists() || gtocoreMap.length() < 32) && repoGtocoreTsrg.exists()) {
                Files.copy(repoGtocoreTsrg.toPath(), gtocoreMap.toPath(), StandardCopyOption.REPLACE_EXISTING)
                logger.lifecycle("Mixin: gtocore tsrg ← src/main/resources")
            }
            if ((!gtocoreMap.exists() || gtocoreMap.length() < 32) && gtolibMap.exists() && gtolibMap.length() > 0) {
                Files.copy(gtolibMap.toPath(), gtocoreMap.toPath(), StandardCopyOption.REPLACE_EXISTING)
                logger.lifecycle("Mixin: 补写 gtocore.refmap.json.mappings.tsrg ← gtolib 映射")
            }
            if (!gtolibMap.exists() || gtolibMap.length() < 32) {
                gtolibMap.text = ''
            }
            if (!gtocoreMap.exists() || gtocoreMap.length() < 32) {
                gtocoreMap.text = ''
            }
            // 2) 强制补全 ResourceLocationMixn（reobf 必需）
            ensureResourceLocationMixnTsrg(gtolibMap)
            ensureResourceLocationMixnTsrg(gtocoreMap)
            // 3) 有源码打包时回写 resources，供下次 CI 无 AP 使用
            if (hasGtolibSources && gtolibMap.exists() && gtolibMap.length() > 32) {
                repoGtolibTsrg.parentFile.mkdirs()
                Files.copy(gtolibMap.toPath(), repoGtolibTsrg.toPath(), StandardCopyOption.REPLACE_EXISTING)
                Files.copy(gtocoreMap.toPath(), repoGtocoreTsrg.toPath(), StandardCopyOption.REPLACE_EXISTING)
                logger.lifecycle("Mixin: 已同步 tsrg → src/main/resources（供 CI reobf）")
            }
            // 4) JSON refmap
            publishAndInjectGtolibRefmaps(null, hasGtolibSources)
            def tsrgOk = gtolibMap.text.contains('ResourceLocationMixn') && gtolibMap.text.contains('m_245413_')
            if (!tsrgOk) {
                throw new GradleException(
                        "gtolib.refmap.json.mappings.tsrg 缺少 ResourceLocationMixn/m_245413_，reobf 将失败"
                )
            }
            logger.lifecycle("Mixin: tsrg OK (ResourceLocationMixn → f_/m_)")
        }
    }
    tasks.matching { it.name == 'reobfJar' }.configureEach {
        dependsOn 'buildGtolibProtected', 'ensureMixinRefmapMappings', 'jar'
        mustRunAfter 'jar', 'ensureMixinRefmapMappings'
    }
    // 单独校验任务：reobf 完成后检查（RemapJar 的 archiveFile 属性因版本而异，直接扫 build/libs）
    tasks.register('verifyResourceLocationMixnReobf') {
        group = 'gtolib'
        description = '校验 reobf 后 ResourceLocationMixn 已为 SRG 名（对齐官方 gtolib）'
        dependsOn 'reobfJar'
        doLast {
            def out = file("${buildDir}/libs/${project.mod_id}-forge-1.20.1-${project.version}.jar")
            if (!out.exists()) {
                def found = file("${buildDir}/libs").listFiles()?.find {
                    it.name.startsWith('gtocore') && it.name.endsWith('.jar') &&
                            !it.name.contains('sources') && !it.name.contains('javadoc')
                }
                out = found ?: out
            }
            if (!out.exists()) {
                throw new GradleException("verifyResourceLocationMixnReobf: 找不到 gtocore jar")
            }
            def zf = new java.util.zip.ZipFile(out)
            try {
                def e = zf.getEntry('com/gtolib/mixin/mc/ResourceLocationMixn.class')
                if (e == null) {
                    throw new GradleException("reobf 产物缺少 ResourceLocationMixn.class")
                }
                def bytes = zf.getInputStream(e).bytes
                def text = new String(bytes, 'ISO-8859-1')
                def hasSrgField = text.contains('f_135804_')
                def hasSrgMethod = text.contains('m_245413_')
                def stillNamed = text.contains('assertValidNamespace')
                if (!hasSrgField || !hasSrgMethod || stillNamed) {
                    throw new GradleException(
                            "reobf 后 ResourceLocationMixn 仍非 SRG 名（对齐官方 gtolib 失败）。\n" +
                                    "  f_135804_=${hasSrgField} m_245413_=${hasSrgMethod} " +
                                    "assertValidNamespace仍在=${stillNamed}\n" +
                                    "  检查 build/mixin/*.mappings.tsrg 是否含 ResourceLocationMixn"
                    )
                }
                logger.lifecycle("verify: ResourceLocationMixn SRG OK (f_135804_/m_245413_) ← ${out.name}")
            } finally {
                zf.close()
            }
        }
    }
    tasks.named('build').configure { dependsOn 'verifyResourceLocationMixnReobf' }
    tasks.matching { it.name == 'signJar' }.configureEach { dependsOn 'verifyResourceLocationMixnReobf' }
    tasks.named('sourcesJar', Jar).configure {
        exclude 'com/gtolib/**'
        exclude '**/GTOLib/**'
    }

    try {
        legacyForge.runs.configureEach {
            if (detectGtolibDebugMode()) {
                systemProperty 'gtolib.debug', 'true'
            }
        }
    } catch (Throwable ignored) {
    }
}
