name: "Build and Sign"

# 监听所有 push；仅当 commit message 含触发标记时打包签名
# 触发标记: -b / --build / -build（建议单独成词，如 "release --build"）
on:
  push:

jobs:
  build:
    # 1) 仅官方仓（禁止 fork 上同名 workflow 误触发后向本仓传产物）
    # 2) commit 含构建标记
    if: >
      github.repository == 'GregTech-Odyssey/GTOCore-Main' &&
      (
        contains(github.event.head_commit.message, '--build') ||
        contains(github.event.head_commit.message, '-build') ||
        contains(github.event.head_commit.message, ' -b') ||
        endsWith(github.event.head_commit.message, '-b') ||
        startsWith(github.event.head_commit.message, '-b ')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Org members only
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ORG="GregTech-Odyssey"
          ACTOR="${{ github.actor }}"
          echo "Actor: $ACTOR  Repository: ${{ github.repository }}"
          if [[ "$ACTOR" == *"[bot]" ]]; then
            echo "::error::Bots cannot trigger signed builds."
            exit 1
          fi
          # 204 = 组织成员；404 = 非成员；302 = 私有成员关系（请求方权限不足时偶发）
          CODE=$(curl -sS -o /tmp/member_body.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/orgs/${ORG}/members/${ACTOR}")
          echo "Membership API HTTP $CODE"
          if [ "$CODE" = "204" ]; then
            echo "OK: @${ACTOR} is a member of ${ORG}"
            exit 0
          fi
          # 回退：检查是否为对本仓有写权限的 collaborator（仍限本仓，且须能 push）
          CODE2=$(curl -sS -o /tmp/collab_body.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/collaborators/${ACTOR}/permission")
          echo "Collaborator permission API HTTP $CODE2"
          if [ "$CODE2" = "200" ]; then
            PERM=$(python3 -c "import json; print(json.load(open('/tmp/collab_body.txt')).get('permission',''))" 2>/dev/null || true)
            echo "permission=$PERM"
            case "$PERM" in
              admin|maintain|write)
                # 组织私有成员有时 membership API 非 204；写权限 + 官方仓仍放行
                if [ "$CODE" = "302" ] || [ "$CODE" = "404" ]; then
                  echo "WARN: membership=$CODE but repo permission=$PERM on official repo — allow"
                  exit 0
                fi
                ;;
            esac
          fi
          echo "::error::Only members of ${ORG} may trigger this signed build workflow. Actor @${ACTOR} denied (membership=$CODE)."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 无权限/公开 CI：只用 libs 预构建，不拉私有 submodule
          submodules: false
          fetch-depth: 1

      # 与旧 GTOCore 及已成功签名 run 一致：CI 用 Java 21（模组 --release 21）。
      # 本地开发可用 Java 25 跑 Gradle。密钥仅 secrets→env，不写进仓库/日志。
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore signing keystore
        env:
          GTO_CERTIFICATE: ${{ secrets.GTO_CERT }}
        run: |
          set -euo pipefail
          if [ -z "${GTO_CERTIFICATE:-}" ]; then
            echo "::error::Missing secret GTO_CERT (base64-encoded keystore.jks). Org secret must be available to GTOCore-Main."
            exit 1
          fi
          echo "$GTO_CERTIFICATE" | base64 --decode > keystore.jks
          test -s keystore.jks
          ls -la keystore.jks

      - name: Verify Seal prebuilds
        run: |
          set -euo pipefail
          test -s libs/gtolib-protected.jar
          test -s libs/gto-seal-runtime-1.0.jar
          ls -la libs/gtolib-protected.jar libs/gto-seal-runtime-1.0.jar
          # Seal 必须含 ITransformationService SPI，且不得打进 gtocore
          jar tf libs/gto-seal-runtime-1.0.jar | grep -q 'META-INF/services/cpw.mods.modlauncher.api.ITransformationService'
          echo "OK: seal runtime has ITransformationService SPI"
          if [ -f libs/gtolib-protected.PROTECTED ]; then
            echo "---- gtolib-protected.PROTECTED ----"
            cat libs/gtolib-protected.PROTECTED
          fi

      - name: Build and sign
        env:
          GTO_STOREPASS: ${{ secrets.GTO_KEY }}
          GTO_KEYPASS: ${{ secrets.GTO_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${GTO_STOREPASS:-}" ]; then
            echo "::error::Missing secret GTO_KEY (keystore password)."
            exit 1
          fi
          chmod +x ./gradlew
          # 发行：gtocore（无 Seal SPI）+ 独立 gto-seal-runtime，均签名（密码只经 env 注入 signJar）
          ./gradlew spotlessApply build --no-daemon --stacktrace \
            -Dorg.gradle.java.installations.auto-download=true

      - name: Verify gtocore packaging
        run: |
          set -euo pipefail
          GTO=$(ls build/libs/gtocore*.jar | grep -v sources | grep -v javadoc | head -n1)
          test -n "$GTO"
          if jar tf "$GTO" | grep -q 'META-INF/services/cpw.mods.modlauncher.api.ITransformationService'; then
            echo "::error::gtocore still contains ITransformationService SPI"
            exit 1
          fi
          echo "OK: no ITransformationService SPI in gtocore"
          jar tf "$GTO" | grep -q 'gtolib.refmap.json' || { echo "::error::missing gtolib.refmap.json"; exit 1; }
          jar tf "$GTO" | grep -q 'gtocore.refmap.json' || { echo "::error::missing gtocore.refmap.json"; exit 1; }
          TMP=$(mktemp -d)
          unzip -p "$GTO" gtolib.refmap.json > "$TMP/gtolib.refmap.json"
          python3 -c 'import json,sys; d=json.load(open(sys.argv[1],encoding="utf-8")); n=len(d.get("mappings") or {}); assert n>=10, n; print("OK: gtolib.refmap mappings=", n)' "$TMP/gtolib.refmap.json"
          test -s build/libs/gto-seal-runtime-1.0.jar
          jar tf build/libs/gto-seal-runtime-1.0.jar | grep -q 'META-INF/services/cpw.mods.modlauncher.api.ITransformationService'
          echo "OK: gto-seal-runtime SPI present"
          # ResourceLocationMixn 必须已 reobf 成 SRG（与 maven gtolib-forge 一致）
          GTO=$(ls build/libs/gtocore*.jar | grep -v sources | grep -v javadoc | head -n1)
          TMP=$(mktemp -d)
          unzip -p "$GTO" com/gtolib/mixin/mc/ResourceLocationMixn.class > "$TMP/RL.class"
          strings "$TMP/RL.class" | grep -q 'f_135804_' || { echo "::error::ResourceLocationMixn missing f_135804_ (reobf failed)"; exit 1; }
          strings "$TMP/RL.class" | grep -q 'm_245413_' || { echo "::error::ResourceLocationMixn missing m_245413_ (reobf failed)"; exit 1; }
          if strings "$TMP/RL.class" | grep -q 'assertValidNamespace'; then
            echo "::error::ResourceLocationMixn still has assertValidNamespace (not reobfed)"
            exit 1
          fi
          echo "OK: ResourceLocationMixn SRG names present"

      - name: List outputs
        run: |
          ls -la build/libs/ || true
          echo "--- 产物：gtocore（内容 mod）+ gto-seal-runtime（独立 ITransformationService）---"
          ls -la build/libs/gtocore*.jar 2>/dev/null | grep -v sources | grep -v javadoc || true
          ls -la build/libs/gto-seal-runtime*.jar 2>/dev/null || true

      - name: Upload gtocore
        uses: actions/upload-artifact@v4
        with:
          name: gtocore-build
          path: |
            build/libs/gtocore*.jar
            !build/libs/*-sources.jar
            !build/libs/*-javadoc.jar
          if-no-files-found: error
          retention-days: 7

      - name: Upload seal runtime
        uses: actions/upload-artifact@v4
        with:
          name: gto-seal-runtime
          path: build/libs/gto-seal-runtime-1.0.jar
          if-no-files-found: error
          retention-days: 7
