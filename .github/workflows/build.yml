name: "Build and Sign"

# 触发（官方仓 GregTech-Odyssey/GTOCore-Main）：
# 1) push：commit message 含 -b / --build / -build
# 2) pull_request_target opened：PR 由组织成员提起 → 自动构建一次（无需标记）
# 3) pull_request_target synchronize：最新 head commit 含构建标记才构建
# 4) issue_comment：组织成员在 PR 下评论含 -b / --build / -build → 构建 PR head
#
# 使用 pull_request_target（而非 pull_request）以便 fork 来源的 PR 也能使用
# 本仓/组织 secrets 签名。工作流文件始终取 base 分支，降低被 PR 篡改 workflow 的风险。
# 安全：仅组织成员（或写权限 collaborator）可通过上述路径触发；构建仍会执行 PR 代码，
# 成员在外部贡献上评论 --build 即表示已审阅并愿意签名构建。
on:
  push:
  pull_request_target:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

concurrency:
  group: build-sign-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  # 门禁：解析 ref、构建标记、组织成员；通过后才跑签名构建
  gate:
    if: >
      github.repository == 'GregTech-Odyssey/GTOCore-Main' &&
      (
        (
          github.event_name == 'push' &&
          (
            contains(github.event.head_commit.message, '--build') ||
            contains(github.event.head_commit.message, '-build') ||
            contains(github.event.head_commit.message, ' -b') ||
            endsWith(github.event.head_commit.message, '-b') ||
            startsWith(github.event.head_commit.message, '-b ')
          )
        ) ||
        (
          github.event_name == 'pull_request_target' &&
          (github.event.action == 'opened' || github.event.action == 'synchronize')
        ) ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request &&
          (
            contains(github.event.comment.body, '--build') ||
            contains(github.event.comment.body, '-build') ||
            contains(github.event.comment.body, '-b')
          )
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_build: ${{ steps.resolve.outputs.should_build }}
      checkout_repo: ${{ steps.resolve.outputs.checkout_repo }}
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      reason: ${{ steps.resolve.outputs.reason }}
    steps:
      - name: Resolve trigger, ref, membership
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          # push
          PUSH_SHA: ${{ github.sha }}
          # pull_request_target
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number || 0 }}
          PR_USER: ${{ github.event.pull_request.user.login || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name || '' }}
          # issue_comment
          COMMENT_BODY: ${{ github.event.comment.body || '' }}
          COMMENT_USER: ${{ github.event.comment.user.login || '' }}
          IS_PR_COMMENT: ${{ github.event.issue.pull_request && 'true' || 'false' }}
          HEAD_COMMIT_MSG: ${{ github.event.head_commit.message || '' }}
        run: |
          set -euo pipefail
          ORG="GregTech-Odyssey"
          API="https://api.github.com"
          HDR=(-H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28")

          has_build_marker() {
            local msg="$1"
            [[ "$msg" == *'--build'* ]] && return 0
            [[ "$msg" == *'-build'* ]] && return 0
            [[ "$msg" == *' -b'* ]] && return 0
            [[ "$msg" == '-b' || "$msg" == '-b '* || "$msg" == *'-b' ]] && return 0
            return 1
          }

          # 返回 0=成员/写权限；1=明确拒绝（bot）；2=非成员
          check_org_member_or_writer() {
            local user="$1"
            if [[ "$user" == *'[bot]' ]]; then
              echo "BOT: @${user}"
              return 1
            fi
            local code
            code=$(curl -sS -o /tmp/member_body.txt -w "%{http_code}" \
              "${HDR[@]}" "${API}/orgs/${ORG}/members/${user}")
            echo "Membership API HTTP $code for @${user}"
            if [ "$code" = "204" ]; then
              echo "OK: @${user} is a member of ${ORG}"
              return 0
            fi
            local code2
            code2=$(curl -sS -o /tmp/collab_body.txt -w "%{http_code}" \
              "${HDR[@]}" "${API}/repos/${REPO}/collaborators/${user}/permission")
            echo "Collaborator permission API HTTP $code2"
            if [ "$code2" = "200" ]; then
              local perm
              perm=$(python3 -c "import json; print(json.load(open('/tmp/collab_body.txt')).get('permission',''))" 2>/dev/null || true)
              echo "permission=$perm"
              case "$perm" in
                admin|maintain|write)
                  if [ "$code" = "302" ] || [ "$code" = "404" ]; then
                    echo "WARN: membership=$code but repo permission=$perm on official repo — allow"
                    return 0
                  fi
                  ;;
              esac
            fi
            echo "DENIED: @${user} is not an org member / write collaborator (membership=$code)"
            return 2
          }

          # require_member=true 时非成员使 job 失败（红叉）；false 时仅 skip（外部开 PR 不刷红）
          require_member_or_skip() {
            local user="$1"
            local soft="$2" # "soft" | "hard"
            local rc=0
            check_org_member_or_writer "$user" || rc=$?
            if [ "$rc" -eq 0 ]; then
              return 0
            fi
            if [ "$rc" -eq 1 ]; then
              echo "::error::Bots cannot trigger signed builds."
              exit 1
            fi
            if [ "$soft" = "soft" ]; then
              skip "user @${user} is not an org member"
            fi
            echo "::error::Only members of ${ORG} may trigger this signed build. User @${user} denied."
            exit 1
          }

          skip() {
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "checkout_repo=" >> "$GITHUB_OUTPUT"
            echo "checkout_ref=" >> "$GITHUB_OUTPUT"
            echo "reason=$1" >> "$GITHUB_OUTPUT"
            echo "SKIP: $1"
            exit 0
          }

          echo "Event=$EVENT_NAME action=${EVENT_ACTION:-} actor=$ACTOR repo=$REPO"

          CHECK_USER=""
          CHECKOUT_REPO="$REPO"
          CHECKOUT_REF=""
          REASON=""
          # push / 评论 / 同步带标记：非成员应失败或 skip；opened 外部贡献 soft skip
          MEMBER_MODE="hard"

          case "$EVENT_NAME" in
            push)
              if ! has_build_marker "$HEAD_COMMIT_MSG"; then
                skip "push without build marker"
              fi
              CHECK_USER="$ACTOR"
              CHECKOUT_REPO="$REPO"
              CHECKOUT_REF="$PUSH_SHA"
              REASON="push with build marker"
              MEMBER_MODE="hard"
              ;;

            pull_request_target)
              CHECKOUT_REPO="$PR_HEAD_REPO"
              CHECKOUT_REF="$PR_HEAD_SHA"
              echo "PR #${PR_NUMBER} author=@${PR_USER} head=${PR_HEAD_REPO}@${PR_HEAD_SHA}"

              if [ "$EVENT_ACTION" = "opened" ]; then
                # 开启时：仅组织成员提起 → 自动构建，无需标记；外部贡献 soft skip（不红叉）
                CHECK_USER="$PR_USER"
                REASON="PR opened by org member"
                MEMBER_MODE="soft"
              elif [ "$EVENT_ACTION" = "synchronize" ]; then
                # 同步时：最新 head commit 必须带构建标记
                # -f：HTTP 4xx/5xx 视为失败，便于回退到 base 仓 commits API
                COMMIT_JSON=$(curl -sS -f "${HDR[@]}" \
                  "${API}/repos/${PR_HEAD_REPO}/commits/${PR_HEAD_SHA}" \
                  || curl -sS -f "${HDR[@]}" "${API}/repos/${REPO}/commits/${PR_HEAD_SHA}")
                COMMIT_MSG=$(python3 -c "import json,sys; print(json.load(sys.stdin).get('commit',{}).get('message',''))" <<<"$COMMIT_JSON")
                echo "Head commit message (first line): $(echo "$COMMIT_MSG" | head -n1)"
                if ! has_build_marker "$COMMIT_MSG"; then
                  skip "PR synchronize without build marker on head commit"
                fi
                # 同步带标记：校验推送者（actor）为组织成员；外部带标记 push soft skip
                CHECK_USER="$ACTOR"
                REASON="PR synchronize with build marker"
                MEMBER_MODE="soft"
              else
                skip "unsupported pull_request_target action=${EVENT_ACTION}"
              fi
              ;;

            issue_comment)
              if [ "$IS_PR_COMMENT" != "true" ]; then
                skip "comment is not on a pull request"
              fi
              if ! has_build_marker "$COMMENT_BODY"; then
                skip "PR comment without build marker"
              fi
              # 评论触发：评论者须为组织成员；非成员评论 --build soft skip
              CHECK_USER="${COMMENT_USER:-$ACTOR}"
              PR_JSON=$(curl -sS "${HDR[@]}" "${API}/repos/${REPO}/pulls/${PR_NUMBER}")
              CHECKOUT_REPO=$(python3 -c "import json,sys; print(json.load(sys.stdin)['head']['repo']['full_name'])" <<<"$PR_JSON")
              CHECKOUT_REF=$(python3 -c "import json,sys; print(json.load(sys.stdin)['head']['sha'])" <<<"$PR_JSON")
              HEAD_REF=$(python3 -c "import json,sys; print(json.load(sys.stdin)['head']['ref'])" <<<"$PR_JSON")
              echo "PR #${PR_NUMBER} comment by @${CHECK_USER} → build ${CHECKOUT_REPO}@${CHECKOUT_REF} (${HEAD_REF})"
              REASON="PR comment build marker by org member"
              MEMBER_MODE="soft"
              ;;

            *)
              skip "unsupported event ${EVENT_NAME}"
              ;;
          esac

          if [ -z "$CHECKOUT_REF" ] || [ -z "$CHECKOUT_REPO" ]; then
            echo "::error::Failed to resolve checkout ref/repo"
            exit 1
          fi

          require_member_or_skip "$CHECK_USER" "$MEMBER_MODE"

          {
            echo "should_build=true"
            echo "checkout_repo=${CHECKOUT_REPO}"
            echo "checkout_ref=${CHECKOUT_REF}"
            echo "reason=${REASON}"
          } >> "$GITHUB_OUTPUT"
          echo "BUILD: $REASON → ${CHECKOUT_REPO}@${CHECKOUT_REF}"

  build:
    needs: gate
    if: needs.gate.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # fork PR：显式拉 head 仓与 sha；persist-credentials=false 避免把 token 留给不可信构建脚本
          repository: ${{ needs.gate.outputs.checkout_repo }}
          ref: ${{ needs.gate.outputs.checkout_ref }}
          persist-credentials: false
          # 无权限/公开 CI：只用 libs 预构建，不拉私有 submodule
          submodules: false
          fetch-depth: 1

      # 与旧 GTOCore 及已成功签名 run 一致：CI 用 Java 21（模组 --release 21）。
      # 本地开发可用 Java 25 跑 Gradle。密钥仅 secrets→env，不写进仓库/日志。
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore signing keystore
        env:
          GTO_CERTIFICATE: ${{ secrets.GTO_CERT }}
        run: |
          set -euo pipefail
          if [ -z "${GTO_CERTIFICATE:-}" ]; then
            echo "::error::Missing secret GTO_CERT (base64-encoded keystore.jks). Org secret must be available to GTOCore-Main."
            exit 1
          fi
          echo "$GTO_CERTIFICATE" | base64 --decode > keystore.jks
          test -s keystore.jks
          ls -la keystore.jks

      - name: Verify Seal prebuilds
        run: |
          set -euo pipefail
          test -s libs/gtolib-protected.jar
          test -s libs/gto-seal-runtime-1.0.jar
          ls -la libs/gtolib-protected.jar libs/gto-seal-runtime-1.0.jar
          # Seal 必须含 ITransformationService SPI，且不得打进 gtocore
          jar tf libs/gto-seal-runtime-1.0.jar | grep -q 'META-INF/services/cpw.mods.modlauncher.api.ITransformationService'
          echo "OK: seal runtime has ITransformationService SPI"
          if [ -f libs/gtolib-protected.PROTECTED ]; then
            echo "---- gtolib-protected.PROTECTED ----"
            cat libs/gtolib-protected.PROTECTED
          fi

      - name: Build and sign
        env:
          GTO_STOREPASS: ${{ secrets.GTO_KEY }}
          GTO_KEYPASS: ${{ secrets.GTO_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${GTO_STOREPASS:-}" ]; then
            echo "::error::Missing secret GTO_KEY (keystore password)."
            exit 1
          fi
          chmod +x ./gradlew
          # 发行：gtocore（无 Seal SPI）+ 独立 gto-seal-runtime，均签名（密码只经 env 注入 signJar）
          ./gradlew spotlessApply build --no-daemon --stacktrace \
            -Dorg.gradle.java.installations.auto-download=true

      - name: Verify gtocore packaging
        run: |
          set -euo pipefail
          GTO=$(ls build/libs/gtocore*.jar | grep -v sources | grep -v javadoc | head -n1)
          test -n "$GTO"
          if jar tf "$GTO" | grep -q 'META-INF/services/cpw.mods.modlauncher.api.ITransformationService'; then
            echo "::error::gtocore still contains ITransformationService SPI"
            exit 1
          fi
          echo "OK: no ITransformationService SPI in gtocore"
          jar tf "$GTO" | grep -q 'gtolib.refmap.json' || { echo "::error::missing gtolib.refmap.json"; exit 1; }
          jar tf "$GTO" | grep -q 'gtocore.refmap.json' || { echo "::error::missing gtocore.refmap.json"; exit 1; }
          TMP=$(mktemp -d)
          unzip -p "$GTO" gtolib.refmap.json > "$TMP/gtolib.refmap.json"
          python3 -c 'import json,sys; d=json.load(open(sys.argv[1],encoding="utf-8")); n=len(d.get("mappings") or {}); assert n>=10, n; print("OK: gtolib.refmap mappings=", n)' "$TMP/gtolib.refmap.json"
          test -s build/libs/gto-seal-runtime-1.0.jar
          jar tf build/libs/gto-seal-runtime-1.0.jar | grep -q 'META-INF/services/cpw.mods.modlauncher.api.ITransformationService'
          echo "OK: gto-seal-runtime SPI present"
          # ResourceLocationMixn 必须已 reobf 成 SRG（与 maven gtolib-forge 一致）
          python3 -c "import zipfile,sys; d=zipfile.ZipFile(sys.argv[1]).read('com/gtolib/mixin/mc/ResourceLocationMixn.class').decode('latin-1'); assert 'f_135804_' in d and 'm_245413_' in d and 'assertValidNamespace' not in d; print('OK: ResourceLocationMixn SRG names present')" "$GTO"

      - name: List outputs
        run: |
          ls -la build/libs/ || true
          echo "--- 产物：gtocore（内容 mod）+ gto-seal-runtime（独立 ITransformationService）---"
          ls -la build/libs/gtocore*.jar 2>/dev/null | grep -v sources | grep -v javadoc || true
          ls -la build/libs/gto-seal-runtime*.jar 2>/dev/null || true
          echo "Gate reason: ${{ needs.gate.outputs.reason }}"
          echo "Built: ${{ needs.gate.outputs.checkout_repo }}@${{ needs.gate.outputs.checkout_ref }}"

      - name: Upload gtocore
        uses: actions/upload-artifact@v4
        with:
          name: gtocore-build
          path: |
            build/libs/gtocore*.jar
            !build/libs/*-sources.jar
            !build/libs/*-javadoc.jar
          if-no-files-found: error
          retention-days: 7

      - name: Upload seal runtime
        uses: actions/upload-artifact@v4
        with:
          name: gto-seal-runtime
          path: build/libs/gto-seal-runtime-1.0.jar
          if-no-files-found: error
          retention-days: 7
